description: "TRIOBJ_DCPO_V2 — DCPO-style 3-region token-masked advantage routing. Fixes TRIOBJ_META_V1's meta-collapse (meta_revision_utility was identically 0 all run; response_length 924->308, entropy 0.12->0.014). 3 reward heads routed to their OWN token regions: R_corr(non-meta reasoning+answers) / R_meta(meta-content tokens, warrant-gated flip-credit + sandbagging canary clamp, NO keyword gate) / R_cal(conf token, per-instance Brier). Advantage = per-region masked tensor (NOT summed broadcast) -> correctness can't crush meta tokens. KL/entropy off (use_kl_loss=false, Dr.GRPO). TRAIN-ONLY (no inline eval -> avoids the OOM that killed triobj-meta-v1b's inline auto-eval; standalone eval runs separately on gs300). v8_strict cold-start, 300 steps, train 4k. Resume-from-HF + push daemon. Pushes to iamseungpil/metacot-h200-triobj-dcpo-v2."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_dcpo_v2
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "442626687"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: skilldiscovery2
        WANDB_RUN_GROUP: triobj_dcpo_v2
        WANDB_NAME: triobj_dcpo_v2
        WANDB_TAGS: TRIOBJ,DCPO,v2,region_routed,TRIOBJ_DCPO_V2
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ===== TWO-PASS PROMPT REWRITE (ADDITIVE, isolated) — identical to TRIOBJ_META_V1 =====
        python -c "
        import pandas as pd
        INSTR = (
            \"Solve the problem in two passes.\n\"
            \"PASS 1 - Give a PRELIMINARY answer in \\\\boxed{...}.\n\"
            \"PASS 2 - Then write a <|meta|> ... <|/meta|> block that verifies/critiques your preliminary answer and states your confidence (0.0-1.0). If the check reveals an error, revise. Finally give your FINAL answer in \\\\boxed{...}.\n\"
            \"Only the LAST \\\\boxed{...} is graded as your final answer.\n\n\"
        )
        def rewrite(src, dst):
            df = pd.read_parquet(src)
            def fix(p):
                p = list(p)
                if p and isinstance(p[0], dict) and p[0].get(\"role\") == \"user\":
                    p[0] = {**p[0], \"content\": INSTR + p[0][\"content\"]}
                else:
                    p = [{\"role\": \"user\", \"content\": INSTR}] + p
                return p
            df[\"prompt\"] = df[\"prompt\"].apply(fix)
            df.to_parquet(dst)
            print(\"[dcpo] wrote\", dst, len(df), \"rows\")
        rewrite(\"/scratch/metacognition/data/verl_train_redirect.parquet\", \"/scratch/metacognition/data/verl_triobj_train.parquet\")
        rewrite(\"/scratch/metacognition/data/verl_val_redirect.parquet\",   \"/scratch/metacognition/data/verl_triobj_val.parquet\")
        " 2>&1 | tail -5

        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/triobj_dcpo_v2_h100_4x4k --repo_id iamseungpil/metacot-h200-triobj-dcpo-v2 --token $${HF_TOKEN} --interval 90 --config_name triobj_dcpo_v2_h100_4x4k > /scratch/logs/push_dcpo.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF (durability): pull latest global_step from HF + iteration pointer.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v2 --config_name triobj_dcpo_v2_h100_4x4k --local_dir /scratch/checkpoints/triobj_dcpo_v2_h100_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_DCPO_V2 = env-reward-only region-routed GDPO (teacher OFF). ABSOLUTE data paths.
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v2_h100_4x4k \
            trainer.experiment_name=triobj_dcpo_v2_h100_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/triobj_dcpo_v2_h100_4x4k \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        # TRAIN-ONLY: no inline eval (avoids the OOM that killed triobj-meta-v1b). Run a
        # standalone clean-process eval on the final gs300 separately (clone h200_triobj_eval.yaml).
        echo "[YAML] triobj_dcpo_v2 TRAIN done rc=$${VERL_RC}; standalone eval runs separately on gs300"
        sleep 86400
        '
