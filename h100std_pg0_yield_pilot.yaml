description: "PG0 — redirect-priming YIELD PILOT (spec 2026-06-18 §0 PG0 + §4.A). The cheapest pre-gate: before the big harvest or any RL spend, roll out the SFT-init model (v8_meta_inside_strict_sft) n=8 on a 200-problem pilot pool from the RL meta_mix train parquet, keep problems in the FROZEN pass-rate band [0.125,0.5] with >=1 wrong rollout, splice the wrong prefixes (frac 0.3-0.7) and regenerate 3 ANSWER-BLIND arms (R=redirect / N'=null-meta / Nc=plain) k=8, grade with rewards._check_correctness, accept via harvest_redirect_cf.accept_redirect, then project accepted-redirect yield (emission x in_band x accept x full_pool) vs target 1500 and print a GO/STOP verdict. Low projected yield => STOP/redesign in minutes (spec §6, §8). Standard 80G4-H100, vLLM (mirrors eval_vllm_1030.py). Reuses already-built+tested pure logic; only main() wires GPU. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: pg0_yield_pilot
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "451394122"
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        HF_HUB_DISABLE_XET: "1"
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/models /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        $${PYBIN} /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage the SFT init (v8_meta_inside_strict_sft) from the HF dataset ──
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"SFT init staged\")
        "
        $${PYBIN} -c "
        import json, os; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition

        # ════════ PG0 yield pilot (vLLM) — prints GO/STOP verdict ════════
        $${PYBIN} scripts/pg0_yield_pilot.py \
            --model_path /scratch/models/v8_meta_inside_strict_sft \
            --train_parquet /scratch/metacognition/data/verl_train_meta_mix.parquet \
            --pool_size 200 \
            --full_pool 2935 \
            --target 1500 \
            --tp_size 4 \
            --output_dir /scratch/eval_results/pg0_yield_pilot \
            2>&1 | tee /scratch/logs/pg0_yield_pilot.log
        echo "[YAML] pg0_yield_pilot DONE"
        sleep 86400
        '
