description: R5 step 300 16k eval on H100 — download from HF + merge + eval + push.

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: r5_step300_eval
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 86400
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: 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
        HUGGING_FACE_HUB_TOKEN: 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
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/eval_results
        cd /scratch

        # 1. Install hub + pull code tarball
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        python -c "
        from huggingface_hub import hf_hub_download
        import os, tarfile
        p = hf_hub_download(repo_id=\"iamseungpil/metacot\", filename=\"code_snapshots/metacognition.tar.gz\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"])
        t = tarfile.open(p); t.extractall(\"/scratch\"); t.close()
        print(\"code extracted\")
        "

        # 2. Bootstrap simplerl env
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        which python && python --version

        # 3. Stage parquet
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # 4. Download R5 step 300 ckpt from HF
        python -c "
        from huggingface_hub import snapshot_download
        import os
        snapshot_download(
            repo_id=\"iamseungpil/metacot-h100-rlsd-forced-meta-R5-0504\",
            repo_type=\"model\",
            token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/verl_rlsd_forced_meta_R5_h100_4x4k/global_step_300/**\"],
            local_dir=\"/scratch\",
        )
        print(\"step 300 ckpt downloaded\")
        "

        # 5. Merge FSDP shards to HF format
        CKPT=/scratch/checkpoints/verl_rlsd_forced_meta_R5_h100_4x4k/global_step_300/actor
        MERGED=/scratch/eval_results/merged_R5_step300
        mkdir -p $$MERGED
        python -m verl.model_merger merge \
          --backend fsdp \
          --local_dir $$CKPT \
          --target_dir $$MERGED

        # 6. Patch tokenizer
        python -c "
        import json, os
        p = \"/scratch/eval_results/merged_R5_step300/tokenizer_config.json\"
        if os.path.exists(p):
            cfg = json.load(open(p))
            cfg.pop(\"extra_special_tokens\", None)
            json.dump(cfg, open(p, \"w\"), indent=2)
            print(\"tokenizer patched\")
        "

        # 7. Run 16k eval
        EVAL_DIR=/scratch/eval_results/eval_r5_step300_16k
        mkdir -p $$EVAL_DIR
        export VLLM_WORKER_MULTIPROC_METHOD=spawn
        export PYTHONPATH=/scratch/metacognition

        python /scratch/metacognition/scripts/eval_vllm_1030.py \
          --model_path /scratch/eval_results/merged_R5_step300 \
          --model_name r5_step300_16k \
          --output_dir $$EVAL_DIR \
          --max_tokens 16384 \
          --tp_size 4 2>&1 | tee $$EVAL_DIR/eval.log

        # 8. Push eval results to HF
        python -c "
        from huggingface_hub import HfApi
        import os
        HfApi().upload_folder(
            folder_path=\"/scratch/eval_results/eval_r5_step300_16k\",
            path_in_repo=\"eval/r5_step300_16k_2026_05_07\",
            repo_id=\"iamseungpil/metacot\",
            repo_type=\"dataset\",
            token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"*.json\", \"*.parquet\", \"*.log\"],
        )
        print(\"R5 step 300 eval pushed to HF\")
        "
        echo "[YAML] R5 16k eval complete"
        sleep 86400
        '
