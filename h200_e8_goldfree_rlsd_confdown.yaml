description: "E.8 GOLD-FREE RLSD conf-down — the clean ONE-VARIABLE ablation of E.4. SAME form as E.4 (mode=RLSD_META_CONTRAST, magnitude-reshaping) but sdc_contrast_variant=conf_free (teacher = confidence:0.15 vs 0.95, NO gold injected = gold-free). E.4's gold_conf_down used the SAME magnitude form but a GOLD-conditioned conf teacher -> E.8 isolates the gold-free variable to answer 'was E.4's failure (0.714 < 0.786 baseline) due to gold-conditioning?'. Magnitude-reshaping is the validated-safe form (Self-Distilled RLVR 2604.03128); GFN/KL distribution-matching is a separate later experiment. 1 job, same v8_strict cold-start / verl_train_redirect / 300 steps as E.4 -> directly comparable to E.4 baseline 0.786 + gold_conf_down 0.714. Tokens via env."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: e8_gf_rlsd
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "439465982"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: skilldiscovery2
        WANDB_RUN_GROUP: e8_goldfree_rlsd
        WANDB_NAME: e8_gf_rlsd_confdown
        WANDB_TAGS: CTSD,E8,goldfree,confdown,RLSD_META_CONTRAST
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/verl_e8_goldfree_rlsd_confdown --repo_id iamseungpil/metacot-h200-e8-goldfree-rlsd-confdown --token $${HF_TOKEN} --interval 90 --config_name verl_e8_goldfree_rlsd_confdown > /scratch/logs/push_e8.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # E.8 = RLSD_META_CONTRAST (SAME magnitude form as E.4, default in base config) + conf_free
        # (gold-free confidence:0.15/0.95 teacher, NO gold). ONE-variable ablation: gold-free only.
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=verl_e4_selfdistill_h200_4x4k \
            algorithm.sdc_contrast_variant=conf_free \
            trainer.experiment_name=verl_e8_goldfree_rlsd_confdown \
            trainer.default_local_dir=/scratch/checkpoints/verl_e8_goldfree_rlsd_confdown \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        if [ "$${VERL_RC}" -ne 0 ]; then echo "[YAML] verl_sdc failed, exit 1"; exit 1; fi
        sleep 86400
        '
