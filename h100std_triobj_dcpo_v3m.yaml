description: "TRIOBJ_DCPO_V3 — DCPO 3-region token-masked advantage routing with a CAUSAL counterfactual R_meta. Replaces v2's transition-table proxy (answer1->answer2 flip) with the real ablation: R_meta = c_with - c_without = correct(main) - correct(counterfactual generated from the SAME prefix with <|meta|> suppressed). 3 reward heads routed to their OWN token regions: R_corr(non-meta reasoning+answers) / R_meta(meta-content tokens, causal delta in {-1,0,+1}) / R_cal(conf token, Brier vs c_with). sdc_counterfactual=true installs the CF 2nd-generation wrap (cut at first <|meta|>, regenerate meta-suppressed via logit_bias, grade). Trains on the PLAIN redirect prompt (NO two-pass INSTR) so the model emits its natural single-pass meta (99.8% emit vs 65% with INSTR). KL/entropy off (Dr.GRPO). v8_strict cold-start, 300 steps, train 4k. Resume-from-HF + push daemon. Pushes to iamseungpil/metacot-h200-triobj-dcpo-v3."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_dcpo_v3
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "444506526"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: skilldiscovery2
        WANDB_RUN_GROUP: triobj_dcpo_v3m
        WANDB_NAME: triobj_dcpo_v3m
        WANDB_TAGS: TRIOBJ,DCPO,v3m,anticollapse,floor,counterfactual,TRIOBJ_DCPO_V3
        # FULL rollout observability (user ask after the v3b silent-signal bug):
        # every step, EVERY rollout -> wandb Table 'dcpo/rollouts' (main text tail,
        # CF text tail, c_with/c_without, all 3 head rewards, conf, has_meta).
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # NO TWO-PASS PROMPT REWRITE (spec §5.3): v3 trains DIRECTLY on the plain
        # redirect parquets (verl_train_redirect.parquet / verl_val_redirect.parquet)
        # so the model emits its natural single-pass <think>...<|meta|>...answer.
        # The counterfactual 2nd-generation supplies the causal R_meta signal.

        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/triobj_dcpo_v3_h100_4x4k --repo_id iamseungpil/metacot-h200-triobj-dcpo-v3 --token $${HF_TOKEN} --interval 90 --config_name triobj_dcpo_v3_h100_4x4k > /scratch/logs/push_dcpo.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF (durability): pull latest global_step from HF + iteration pointer.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v3 --config_name triobj_dcpo_v3_h100_4x4k --local_dir /scratch/checkpoints/triobj_dcpo_v3_h100_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_DCPO_V3 = env-reward-only region-routed GDPO (teacher OFF) + counterfactual R_meta. ABSOLUTE data paths.
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v3_h100_4x4k \
            trainer.experiment_name=triobj_dcpo_v3_h100_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/triobj_dcpo_v3_h100_4x4k \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        # TRAIN-ONLY: no inline eval. Run a standalone clean-process eval on the final gs300 separately.
        echo "[YAML] triobj_dcpo_v3 TRAIN done rc=$${VERL_RC}; standalone eval runs separately on gs300"
        sleep 86400
        '
