description: "TRIOBJ_DCPO_V4 STAGE-3B — meta-format PRIMING RL. Identical to s3 (data=meta_mix, rollout.n=8, clip-higher, ALL composition knobs anchor/emit-route/len-cap/trunc-penalty/len_cost + PMI R_meta byte-identical) EXCEPT: init = the format-primed SFT checkpoint v8_s3b_format_primed (instead of v8_strict), dcpo_recover_first_pair=true (Task 8 widened auto-correction), and DCPO_META_CLOSE_FORCE=1 (best-effort decode guard; if it errors at runtime set it to 0 and rerun — s3b still valid). SFT priming + decode guard handle meta FORM; PMI handles usefulness. Specs: docs/superpowers/specs/2026-06-15-s3b-meta-format-priming-design.md. Pushes to iamseungpil/metacot-h200-triobj-dcpo-v3 under checkpoints/triobj_dcpo_v4_stage3b_h100_4x4k/."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_dcpo_v4_s3b
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "REPLACE_WITH_RELEASE_ASSET_ID"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-dcpo-v4
        WANDB_RUN_GROUP: dcpo_v4_useful_meta
        WANDB_NAME: dcpo_v4_s3b
        WANDB_TAGS: TRIOBJ,DCPO,v4,stage3b,format-priming,from-primed-sft,pmi,anchor,emit-route,len-cap,composition,meta-mix,clip-higher,recover-pair,meta-close,TRIOBJ_DCPO_V4
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        # s3b best-effort decode guard (§3.2): force <|/meta|> after a token budget.
        # If verl/vLLM rejects logits_processors at runtime, operator sets this to 0
        # and reruns — s3b stays valid (relies on SFT priming + recover-pair).
        DCPO_META_CLOSE_FORCE: "1"
        DCPO_META_CLOSE_N: "96"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage the FORMAT-PRIMED SFT (s3b init + frozen PMI ref worker) ──────
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_s3b_format_primed/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_s3b_format_primed\"; dst=\"/scratch/models/v8_s3b_format_primed\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"primed SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_s3b_format_primed/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/triobj_dcpo_v4_stage3b_h100_4x4k --repo_id iamseungpil/metacot-h200-triobj-dcpo-v3 --token $${HF_TOKEN} --interval 90 --config_name triobj_dcpo_v4_stage3b_h100_4x4k > /scratch/logs/push_dcpo.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF durability for stage-3b itself.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v3 --config_name triobj_dcpo_v4_stage3b_h100_4x4k --local_dir /scratch/checkpoints/triobj_dcpo_v4_stage3b_h100_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_DCPO_V4 STAGE-3B = s3 (PMI + conflict-free composition on meta-mix)
        # with init = format-primed SFT + recover-first-pair + best-effort decode guard.
        WANDB_NAME=dcpo_v4_s3b /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v4_stage3b_h100_4x4k \
            trainer.experiment_name=triobj_dcpo_v4_stage3b_h100_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/triobj_dcpo_v4_stage3b_h100_4x4k \
            actor_rollout_ref.model.path=/scratch/models/v8_s3b_format_primed \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc stage3b rc=$${VERL_RC}"
        sleep 86400
        '
