description: "TRIOBJ_META_V1 — tri-objective meta-revision RL (SAFE v1: reward+config only, NO verl-internal advantage/token-mask surgery). CLONE of the WORKING e8 yaml structure (resume-pull + train->eval->push auto pipeline). Env-reward-only GDPO multi-head: correctness(1.0) + meta_revision_utility(0.5, NEW two-sided outcome-gated) + meta_commit_shape(0.3). TRIOBJ_META_V1 in _VANILLA_MODES -> teacher OFF, directly comparable to base GRPO. Two-pass output: preliminary boxed -> <|meta|> verify/confidence -> final boxed (LAST boxed graded). v8_strict cold-start, 300 steps, train 4k / eval 16k. Pushes to iamseungpil/metacot-h200-triobj-meta-v1."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_meta_v1
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "PLACEHOLDER_REVISION"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: skilldiscovery2
        WANDB_RUN_GROUP: triobj_meta_v1
        WANDB_NAME: triobj_meta_v1
        WANDB_TAGS: TRIOBJ,META,v1,meta_revision,TRIOBJ_META_V1
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ===== TWO-PASS PROMPT REWRITE (ADDITIVE, isolated) =====
        # Prepend the two-pass instruction to every prompt and write NEW parquets
        # (verl_triobj_{train,val}.parquet) that the config points at via ABSOLUTE
        # paths. Touches NO existing file/parquet — the redirect parquets are read-only.
        python -c "
        import pandas as pd
        INSTR = (
            \"Solve the problem in two passes.\n\"
            \"PASS 1 - Give a PRELIMINARY answer in \\\\boxed{...}.\n\"
            \"PASS 2 - Then write a <|meta|> ... <|/meta|> block that verifies/critiques your preliminary answer and states your confidence (0.0-1.0). If the check reveals an error, revise. Finally give your FINAL answer in \\\\boxed{...}.\n\"
            \"Only the LAST \\\\boxed{...} is graded as your final answer.\n\n\"
        )
        def rewrite(src, dst):
            df = pd.read_parquet(src)
            def fix(p):
                p = list(p)
                if p and isinstance(p[0], dict) and p[0].get(\"role\") == \"user\":
                    p[0] = {**p[0], \"content\": INSTR + p[0][\"content\"]}
                else:
                    p = [{\"role\": \"user\", \"content\": INSTR}] + p
                return p
            df[\"prompt\"] = df[\"prompt\"].apply(fix)
            df.to_parquet(dst)
            print(\"[triobj] wrote\", dst, len(df), \"rows\")
        rewrite(\"/scratch/metacognition/data/verl_train_redirect.parquet\", \"/scratch/metacognition/data/verl_triobj_train.parquet\")
        rewrite(\"/scratch/metacognition/data/verl_val_redirect.parquet\",   \"/scratch/metacognition/data/verl_triobj_val.parquet\")
        " 2>&1 | tail -5

        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/verl_triobj_meta_v1_h200_4x4k --repo_id iamseungpil/metacot-h200-triobj-meta-v1 --token $${HF_TOKEN} --interval 90 --config_name verl_triobj_meta_v1_h200_4x4k > /scratch/logs/push_triobj.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF (durability): pull latest global_step from HF into the local
        # ckpt dir + write the iteration pointer so resume_mode=auto survives a
        # cross-node preempt that wiped /scratch.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-meta-v1 --config_name verl_triobj_meta_v1_h200_4x4k --local_dir /scratch/checkpoints/verl_triobj_meta_v1_h200_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_META_V1 = env-reward-only tri-objective GDPO (teacher OFF). A NEW thin
        # config selects mode + ABSOLUTE data paths (avoids the e9 cwd bug).
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=verl_triobj_meta_v1_h200_4x4k \
            trainer.experiment_name=verl_triobj_meta_v1_h200_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/verl_triobj_meta_v1_h200_4x4k \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        if [ "$${VERL_RC}" -ne 0 ]; then echo "[YAML] verl_sdc failed, exit 1"; exit 1; fi

        # ===== AUTO-EVAL after training (train -> eval -> push pipeline) =====
        # Free the GPUs held by ray/gpu_keeper so vLLM can claim them on this node.
        pkill -9 -f gpu_keeper.py 2>/dev/null; ray stop --force 2>/dev/null; sleep 15
        PYBIN=/scratch/conda_envs/simplerl/bin/python
        CKROOT=/scratch/checkpoints/verl_triobj_meta_v1_h200_4x4k
        GS=$$(ls -d $${CKROOT}/global_step_* 2>/dev/null | sed "s#.*global_step_##" | sort -n | tail -1)
        echo "[YAML] auto-eval: final global_step=$${GS}"
        CKPT=$${CKROOT}/global_step_$${GS}/actor
        MERGED=/scratch/eval_results/merged_triobj_meta_v1
        EVAL_DIR=/scratch/eval_results/eval_triobj_meta_v1_1030_16k_k8
        mkdir -p $${MERGED} $${EVAL_DIR}
        $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPT} --target_dir $${MERGED}
        $${PYBIN} -c "
        import json, os
        p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tok patched\")
        "
        # Canonical 1030 (gsm8k500+math500+aime30) via --max_problems 500 (PER-BENCHMARK cap;
        # MUST equal the e4_baseline 0.786 eval which used 500 — GSM8K test has 1319 rows, so
        # --max_problems 1030 would make GSM8K=1030 and break comparability). k=8, 16k.
        $${PYBIN} scripts/eval_vllm_1030.py \
          --model_path $${MERGED} --model_name triobj_meta_v1_1030_16k_k8 --output_dir $${EVAL_DIR} \
          --max_problems 500 --num_samples 8 --max_tokens 16384 --temperature 0.7 --top_p 0.95 --tp_size 4 \
          2>&1 | tee $${EVAL_DIR}/eval.log
        $${PYBIN} scripts/aggregate_e4_eval.py \
          --parquet $${EVAL_DIR}/triobj_meta_v1_1030_16k_k8.parquet \
          --out $${EVAL_DIR}/triobj_meta_v1_1030_16k_k8.e4summary.json --arm triobj_meta_v1 \
          2>&1 | tee $${EVAL_DIR}/aggregate.log
        $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os
        HfApi().upload_folder(folder_path=\"$${EVAL_DIR}\",
            path_in_repo=\"eval/triobj_meta_v1_1030_16k_k8\",
            repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"*.json\", \"*.parquet\", \"*.log\"])
        print(\"eval pushed\")
        " || echo "[YAML] eval upload skipped"
        echo "[YAML] triobj_meta_v1 train->eval->push DONE"
        sleep 86400
        '
