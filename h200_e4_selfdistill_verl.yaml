        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/verl_e4_gold_decoy --repo_id iamseungpil/metacot-h200-e4-gold-decoy --token $${HF_TOKEN} --interval 90 --config_name verl_e4_gold_decoy > /scratch/logs/push_e4.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # ARM 2 gold_decoy = ROD_MQ_CONTRAST, decoy variant (β>0).
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=verl_e4_selfdistill_h200_4x4k \
            algorithm.sdc_contrast_variant=decoy \
            trainer.experiment_name=verl_e4_gold_decoy \
            trainer.default_local_dir=/scratch/checkpoints/verl_e4_gold_decoy \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        if [ "$${VERL_RC}" -ne 0 ]; then echo "[YAML] verl_sdc failed, exit 1"; exit 1; fi
        sleep 86400
        '

