description: "Counterfactual Δ eval for an rv DCPO RL checkpoint (global_step $${GS}). Pulls the verl FSDP checkpoint checkpoints/triobj_dcpo_v4_rv_h100_4x4k/global_step_$${GS}/actor from metacot-h200-triobj-dcpo-v3, merges FSDP->HF (verl.model_merger), then runs eval_counterfactual_difficulty on the held-out meta-mix val: each problem decoded TWICE (arm A normal vs arm B with <|meta|> open banned), at 16k (train-4k/eval-16k convention). Reports acc_with - acc_without stratified by difficulty x scenario — does the RL'd meta CAUSALLY raise accuracy (D-gate Δ>0). vLLM. Standard 80G4-H100. GS set at submit. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: rv_dcpo_cf_eval
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "453075039"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        HF_HUB_DISABLE_XET: "1"
        CONFIG_NAME: triobj_dcpo_v4_rv_h100_4x4k
        REPO: iamseungpil/metacot-h200-triobj-dcpo-v3
        GS: "190"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f\"cuda:{i}\", dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python
        pip uninstall -y hf_xet 2>&1 | tail -1 || true

        $${PYBIN} /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3
        VAL=/scratch/metacognition/data/verl_val_meta_mix.parquet
        ls -la $${VAL} || { echo "[YAML] val parquet missing"; exit 1; }

        # 1. download the verl FSDP checkpoint global_step_$${GS}.
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os
        cfg=os.environ[\"CONFIG_NAME\"]; gs=os.environ[\"GS\"]
        snapshot_download(repo_id=os.environ[\"REPO\"], repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/\"+cfg+\"/global_step_\"+gs+\"/**\"], local_dir=\"/scratch\")
        print(\"gs\"+gs+\" downloaded\")
        "
        CKPT=/scratch/checkpoints/$${CONFIG_NAME}/global_step_$${GS}/actor
        MERGED=/scratch/eval_results/merged_rv_gs$${GS}
        OUT=/scratch/eval_results/cf_rv_dcpo_gs$${GS}.jsonl
        mkdir -p $${MERGED}

        # 2. merge FSDP shards -> HF format.
        $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPT} --target_dir $${MERGED}
        MERGE_RC=$$?
        if [ "$${MERGE_RC}" -ne 0 ]; then echo "[YAML] merge FAILED rc=$${MERGE_RC}"; exit 1; fi
        $${PYBIN} -c "
        import json, os
        p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tok patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # 3. counterfactual 2-arm eval at 16k.
        $${PYBIN} -m src.eval.eval_counterfactual_difficulty \
          --model_path $${MERGED} --val_parquet $${VAL} --out $${OUT} \
          --tp_size 4 --max_new_tokens 16384 \
          2>&1 | tee /scratch/eval_results/cf_rv_dcpo_gs$${GS}.log
        EVAL_RC=$$?
        if [ "$${EVAL_RC}" -ne 0 ]; then echo "[YAML] cf eval FAILED rc=$${EVAL_RC}"; exit 1; fi

        echo "================ RV DCPO gs$${GS} CF SUMMARY ================"
        $${PYBIN} -m src.eval.eval_counterfactual_difficulty_summarize --jsonl $${OUT} 2>&1 | tee /scratch/eval_results/cf_rv_dcpo_gs$${GS}_summary.txt
        echo "=========================================================="

        $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os
        gs=os.environ[\"GS\"]; api=HfApi(token=os.environ[\"HF_TOKEN\"])
        for fn in [\"$${OUT}\", \"/scratch/eval_results/cf_rv_dcpo_gs\"+gs+\"_summary.txt\"]:
            try:
                api.upload_file(path_or_fileobj=fn, path_in_repo=\"eval/rv_dcpo_gs\"+gs+\"/\"+os.path.basename(fn),
                    repo_id=\"iamseungpil/metacot-rv\", repo_type=\"dataset\")
            except Exception as e: print(\"upload skip\", fn, str(e)[:80])
        print(\"rv dcpo cf eval uploaded\")
        " || echo "[YAML] upload skipped"
        echo "[YAML] rv_dcpo_cf_eval gs$${GS} DONE"
        sleep 600
        '
