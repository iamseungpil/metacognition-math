description: "TRIOBJ_DCPO_V4 STAGE-1b — PURE-FORMAT RL + KL anchor (+50 steps). User decision 2026-06-12: stage-1's correctness-dominant mix left wellformed flat at 0.15-0.22; stage-1b flips to w_corr 0 / w_format 1.0 with kl_loss_coef 1e-3 as the anti-degeneration anchor, group n 4->8 (prompts 64->32, same 256 rollouts/step) to restore wellformed-vs-drift contrast inside Dr.GRPO groups. INIT from stage-1 gs50 actor weights (verl.model_merger on the HF-pulled FSDP shards -> /scratch/models/v4_s1_gs50). Floor 0.1 kept. Exit gate at the END of 1b: wellformed 70-80% + corrected PMI probe against THESE weights (stage-2 ref lineage). Pushes to iamseungpil/metacot-h200-triobj-dcpo-v3 under checkpoints/triobj_dcpo_v4_stage1b_h100_4x4k/."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_dcpo_v4_s1b
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "445259710"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: skilldiscovery2
        WANDB_RUN_GROUP: triobj_dcpo_v4_s1b
        WANDB_NAME: triobj_dcpo_v4_s1b
        WANDB_TAGS: TRIOBJ,DCPO,v4,stage1b,pure-format,kl-anchor,TRIOBJ_DCPO_V4
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage-1 gs50 -> merged HF model (the stage-1b init weights) ──────
        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os
        snapshot_download(repo_id=\"iamseungpil/metacot-h200-triobj-dcpo-v3\", repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/triobj_dcpo_v4_stage1_h100_4x4k/global_step_50/actor/*\"], local_dir=\"/scratch/ckpt_dl\")
        print(\"gs50 actor shards staged\")
        "
        /scratch/conda_envs/simplerl/bin/python -m verl.model_merger merge \
            --backend fsdp \
            --local_dir /scratch/ckpt_dl/checkpoints/triobj_dcpo_v4_stage1_h100_4x4k/global_step_50/actor \
            --target_dir /scratch/models/v4_s1_gs50 2>&1 | tail -3
        # tokenizer files live in actor/huggingface — ensure they sit beside the
        # merged weights for vLLM + the trainer tokenizer load.
        cp -n /scratch/ckpt_dl/checkpoints/triobj_dcpo_v4_stage1_h100_4x4k/global_step_50/actor/huggingface/* /scratch/models/v4_s1_gs50/ 2>/dev/null
        python -c "
        import json; p=\"/scratch/models/v4_s1_gs50/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "
        ls /scratch/models/v4_s1_gs50 | head -20

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/triobj_dcpo_v4_stage1b_h100_4x4k --repo_id iamseungpil/metacot-h200-triobj-dcpo-v3 --token $${HF_TOKEN} --interval 90 --config_name triobj_dcpo_v4_stage1b_h100_4x4k > /scratch/logs/push_dcpo.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF (durability for 1b itself): pull latest 1b global_step.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v3 --config_name triobj_dcpo_v4_stage1b_h100_4x4k --local_dir /scratch/checkpoints/triobj_dcpo_v4_stage1b_h100_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_DCPO_V4 STAGE-1b = PURE-format region-routed GDPO + KL anchor.
        /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v4_stage1b_h100_4x4k \
            trainer.experiment_name=triobj_dcpo_v4_stage1b_h100_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/triobj_dcpo_v4_stage1b_h100_4x4k \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc rc=$${VERL_RC}"
        echo "[YAML] triobj_dcpo_v4_s1b TRAIN done rc=$${VERL_RC}; exit-gate (wellformed + corrected probe vs THESE weights) runs separately"
        sleep 86400
        '
