description: "PLACEMENT PROBE — minimal job, SAME target/SKU/tier/image as PG0 + v2, NO bootstrap/staging. Just nvidia-smi + echo. Discriminates: if this ALSO fails with zero logs => pure capacity/placement (code-agnostic); if it runs and prints => placement works and PG0's failure is code/staging-specific."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: placement_probe
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 3600
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
    command:
      - nvidia-smi
      - |
        bash -c '
        set -x
        echo "[PROBE] container started"
        nvidia-smi -L
        echo "[PROBE] placement OK"
        sleep 120
        '
