description: "S3B v1 RESUME (SFT-SKIP) + auto-1030-eval. The v1 BASELINE (forming-cliff) arm: merges the v1 HF checkpoint (global_step_270) to HF format, uses it as the RL init shell, and resumes RL from step 270 via resume_mode=auto to the same total_training_steps=300 as v2 — so v1 and v2 finish at the SAME step for a clean A/B. v1 uses the ORIGINAL config knobs (len_cost 0.08, meta_floor 0.05, w_meta_warmup 80) = NO forming-sustain overrides; this is the meta-died baseline. On RL rc=0 it MERGES the final ckpt and runs eval_vllm_1030.py (GSM8K500+MATH500+AIME30, k8/16k) -> upload, to compare v1(meta-died) vs v2(forming-alive) vs e4_baseline 0.786. Standard 80G4-H100. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: s3b_v1_resume
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "449923427"
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-dcpo-v4
        WANDB_RUN_GROUP: dcpo_v4_useful_meta
        WANDB_NAME: dcpo_v4_s3b_v1
        WANDB_TAGS: TRIOBJ,DCPO,v4,stage3b,v1,baseline,forming-cliff,resume,sft-skip,from-gs270,pmi,meta-mix
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        DCPO_META_CLOSE_FORCE: "1"
        DCPO_META_CLOSE_N: "96"
        HF_HUB_DISABLE_XET: "1"
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
        CONFIG_NAME: triobj_dcpo_v4_stage3b_h100_4x4k
        REPO: iamseungpil/metacot-h200-triobj-dcpo-v3
        RESUME_GS: "280"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        $${PYBIN} /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── pull the v1 RL checkpoint (global_step_270) — used BOTH as the resume
        #    state (resume_mode=auto reads global_step_270/) AND as the init shell
        #    (we merge its FSDP actor -> HF so model.path has the right arch/tokenizer). ──
        CKPTDIR=/scratch/checkpoints/$${CONFIG_NAME}
        mkdir -p $${CKPTDIR}
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os
        cfg=os.environ[\"CONFIG_NAME\"]; gs=os.environ[\"RESUME_GS\"]
        snapshot_download(repo_id=os.environ[\"REPO\"], repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/\"+cfg+\"/global_step_\"+gs+\"/**\"], local_dir=\"/scratch\")
        print(\"resume ckpt gs\"+gs+\" downloaded\")
        "
        # latest_checkpointed_iteration.txt so verl resume_mode=auto picks global_step_270
        echo "$${RESUME_GS}" > $${CKPTDIR}/latest_checkpointed_iteration.txt

        # ── merge gs270 FSDP -> HF as the init shell (NO SFT; ~5min) ──
        INIT=/scratch/models/v1_gs$${RESUME_GS}_init
        mkdir -p $${INIT}
        $${PYBIN} -m verl.model_merger merge --backend fsdp \
            --local_dir $${CKPTDIR}/global_step_$${RESUME_GS}/actor --target_dir $${INIT}
        MERGE_RC=$$?
        if [ "$${MERGE_RC}" -ne 0 ]; then echo "[YAML] init merge FAILED rc=$${MERGE_RC}"; exit 1; fi
        $${PYBIN} -c "
        import json, os; p=\"$${INIT}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"init tokenizer patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition

        # durable checkpoint pusher (so future preempts resume from latest, not gs270).
        nohup $${PYBIN} /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir $${CKPTDIR} --repo_id $${REPO} --token $${HF_TOKEN} --interval 90 --config_name $${CONFIG_NAME} > /scratch/logs/push_v1_resume.log 2>&1 &
        nohup $${PYBIN} /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &

        # ════════ RL resume from gs270 (SFT-skipped) — v1 BASELINE, config-default knobs (NO forming overrides) ════════
        WANDB_NAME=dcpo_v4_s3b_v1 $${PYBIN} -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v4_stage3b_h100_4x4k \
            trainer.experiment_name=$${CONFIG_NAME} \
            trainer.default_local_dir=$${CKPTDIR} \
            actor_rollout_ref.model.path=$${INIT} \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc v1 resume rc=$${VERL_RC}"

        # ════════ on RL completion (step 300): auto 1030 eval vs e4_baseline 0.786 ════════
        if [ "$${VERL_RC}" -eq 0 ]; then
          LASTGS=$$($${PYBIN} -c "
        import glob,re,os
        ds=glob.glob(\"$${CKPTDIR}/global_step_*\")
        gs=sorted(int(re.search(r\"global_step_(\\d+)\",d).group(1)) for d in ds if re.search(r\"global_step_(\\d+)\",d))
        print(gs[-1] if gs else 0)")
          echo "[YAML] RL done; final gs=$${LASTGS}; merging + 1030 eval"
          MERGED=/scratch/eval_results/v1_gs$${LASTGS}_merged
          mkdir -p $${MERGED}
          $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPTDIR}/global_step_$${LASTGS}/actor --target_dir $${MERGED}
          $${PYBIN} -c "
        import json, os; p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2)
        "
          EVDIR=/scratch/eval_results/eval_v1_s3b_gs$${LASTGS}_1030_16k_k8
          mkdir -p $${EVDIR}
          $${PYBIN} scripts/eval_vllm_1030.py --model_path $${MERGED} \
            --model_name v1_s3b_gs$${LASTGS}_1030_16k_k8 --output_dir $${EVDIR} \
            --max_problems 500 --num_samples 8 --max_tokens 16384 --temperature 0.7 --top_p 0.95 --tp_size 4 \
            2>&1 | tee $${EVDIR}/eval.log
          $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os
        HfApi().upload_folder(folder_path=os.environ.get(\"EVDIR\",\"$${EVDIR}\"), path_in_repo=\"eval/v1_s3b_gs$${LASTGS}_1030_16k_k8\",
            repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"], allow_patterns=[\"*.json\",\"*.parquet\",\"*.log\"])
        print(\"[YAML] v1 1030 eval uploaded\")
        " || echo "[YAML] eval upload skipped"
        fi
        echo "[YAML] s3b_v1_resume DONE"
        sleep 86400
        '
