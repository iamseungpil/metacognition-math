description: "E.4 DECISIVE eval — 4-arm (baseline + gold_decoy/gold_stance/gold_conf_down) contrastive-teacher A/B on the FULL 1030 (gsm8k500+math500+aime30) @ the canonical 16k regime (max_tokens=16384, temp 0.7, top_p 0.95, tp=4), k=8 samples. Each job: pull arm global_step_300 from HF → verl.model_merger FSDP→HF → eval_vllm_1030.py → aggregate (acc/pass@k/self-consistency/ECE) → upload. One job per arm = 'each node'. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

# Each arm is an independent job (pull its own gs300 from HF, merge, eval). Launch all 4
# once every arm has global_step_300 on HF, or a subset early (baseline/decoy are done).

jobs:
  - name: e4eval_baseline
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env: &eval_env
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "439234854"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        ARM: baseline
        CONFIG_NAME: verl_e4_baseline
        REPO: iamseungpil/metacot-h200-e4-baseline
        EVAL_DIR_UP: /scratch/eval_results/eval_e4_baseline_1030_16k_k8
    command:
      - nvidia-smi
      - &eval_cmd |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        # code (current: includes aggregate_e4_eval.py + eval_vllm_1030.py) via GH release.
        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python

        # 1. download this arm global_step_300 from its HF repo.
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os
        cfg=os.environ[\"CONFIG_NAME\"]
        snapshot_download(repo_id=os.environ[\"REPO\"], repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/\"+cfg+\"/global_step_300/**\"], local_dir=\"/scratch\")
        print(\"gs300 downloaded\")
        "
        CKPT=/scratch/checkpoints/$${CONFIG_NAME}/global_step_300/actor
        MERGED=/scratch/eval_results/merged_$${ARM}
        EVAL_DIR=/scratch/eval_results/eval_e4_$${ARM}_1030_16k_k8
        mkdir -p $${MERGED} $${EVAL_DIR}

        # 2. merge FSDP shards -> HF format (verl, simplerl env).
        $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPT} --target_dir $${MERGED}
        MERGE_RC=$$?
        if [ "$${MERGE_RC}" -ne 0 ]; then echo "[YAML] merge FAILED rc=$${MERGE_RC}"; exit 1; fi

        # 3. patch tokenizer (pop extra_special_tokens so it loads under the eval transformers).
        $${PYBIN} -c "
        import json, os
        p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tok patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # 4. eval: FULL 1030 (max_problems 500 = gsm8k500+math500+aime30), k=8, 16k regime.
        $${PYBIN} scripts/eval_vllm_1030.py \
          --model_path $${MERGED} --model_name e4_$${ARM}_1030_16k_k8 --output_dir $${EVAL_DIR} \
          --max_problems 500 --num_samples 8 --max_tokens 16384 --temperature 0.7 --top_p 0.95 --tp_size 4 \
          2>&1 | tee $${EVAL_DIR}/eval.log
        EVAL_RC=$$?
        if [ "$${EVAL_RC}" -ne 0 ]; then echo "[YAML] eval FAILED rc=$${EVAL_RC}"; exit 1; fi

        # 5. aggregate per-problem (mean acc / pass@k / self-consistency / ECE / overconf).
        $${PYBIN} scripts/aggregate_e4_eval.py \
          --parquet $${EVAL_DIR}/e4_$${ARM}_1030_16k_k8.parquet \
          --out $${EVAL_DIR}/e4_$${ARM}_1030_16k_k8.e4summary.json --arm $${ARM} \
          2>&1 | tee $${EVAL_DIR}/aggregate.log

        # 6. upload eval dir (json/parquet/summary/logs) to the metacot dataset.
        $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os
        arm=os.environ[\"ARM\"]
        HfApi().upload_folder(folder_path=os.environ[\"EVAL_DIR_UP\"],
            path_in_repo=\"eval/e4_\"+arm+\"_1030_16k_k8\",
            repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"*.json\", \"*.parquet\", \"*.log\"])
        print(\"eval pushed\")
        " || echo "[YAML] upload skipped"
        echo "[YAML] e4eval $${ARM} DONE"
        '

  - name: e4eval_gold_decoy
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env:
        <<: *eval_env
        ARM: gold_decoy
        CONFIG_NAME: verl_e4_gold_decoy
        REPO: iamseungpil/metacot-h200-e4-gold-decoy
        EVAL_DIR_UP: /scratch/eval_results/eval_e4_gold_decoy_1030_16k_k8
    command:
      - nvidia-smi
      - *eval_cmd

  - name: e4eval_gold_stance
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env:
        <<: *eval_env
        ARM: gold_stance
        CONFIG_NAME: verl_e4_gold_stance
        REPO: iamseungpil/metacot-h200-e4-gold-stance
        EVAL_DIR_UP: /scratch/eval_results/eval_e4_gold_stance_1030_16k_k8
    command:
      - nvidia-smi
      - *eval_cmd

  - name: e4eval_gold_conf_down
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env:
        <<: *eval_env
        ARM: gold_conf_down
        CONFIG_NAME: verl_e4_gold_conf_down
        REPO: iamseungpil/metacot-h200-e4-gold-conf-down
        EVAL_DIR_UP: /scratch/eval_results/eval_e4_gold_conf_down_1030_16k_k8
    command:
      - nvidia-smi
      - *eval_cmd
