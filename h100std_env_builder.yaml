description: "ENV SNAPSHOT BUILDER — bake flash-attn 2.8.3 into the conda-pack env so future cold-starts skip the ~15min source build. Runs the SAME bootstrap the arms use (pull simplerl_v3 conda-pack from HF, conda-unpack, build flash-attn), then tars the ready prefix (/scratch/conda_envs/simplerl) and uploads it to HF iamseungpil/metacot env_snapshots/simplerl_v4.tar.gz. bootstrap line 187 (`if ! import flash_attn`) then AUTO-skips the build for any run pointed at v4; v3 stays on HF as fallback. No training, no wandb. One-off."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: env_builder
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 14400
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        CODE_TAR_REVISION: "476318251"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        PYTHONFAULTHANDLER: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        # inline GPU spinner from t~0 (close the Singularity suspend-on-idle window).
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f\"cuda:{i}\", dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        set +x  # do NOT leak GH_TOKEN into xtrace logs
        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        set -x
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        # run the SAME bootstrap the arms use: pulls simplerl_v3 conda-pack, conda-unpack,
        # builds flash-attn 2.8.3 into $${SIMPLERL_DIR}, applies verl source patches.
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"

        # HARD GATE: only pack if flash_attn actually imports (else v4 would be useless).
        if ! "$${SIMPLERL_DIR}/bin/python" -c "import flash_attn; print(\"flash_attn\", flash_attn.__version__)"; then
          echo "[builder] FATAL: flash_attn not importable in $${SIMPLERL_DIR} — refusing to pack v4"
          exit 1
        fi
        "$${SIMPLERL_DIR}/bin/python" -c "import torch; print(\"torch\", torch.__version__, \"cuda\", torch.version.cuda)"

        # tar the READY prefix exactly as v3 was packed: contents of the prefix at archive root,
        # so the arms tar -xzf ... -C $${SIMPLERL_DIR} lands bin/ lib/ ... directly (conda-unpack no-op).
        echo "[builder] packing $${SIMPLERL_DIR} -> /scratch/simplerl_v4.tar.gz"
        tar -czf /scratch/simplerl_v4.tar.gz -C "$${SIMPLERL_DIR}" .
        ls -la /scratch/simplerl_v4.tar.gz

        # upload to HF dataset repo env_snapshots/simplerl_v4.tar.gz (HF_TOKEN via os.environ only;
        # single-line python -c with escaped double-quotes — no heredoc, no single quotes).
        pip install -q hf_transfer 2>&1 | tail -1 || true
        HF_HUB_ENABLE_HF_TRANSFER=1 "$${SIMPLERL_DIR}/bin/python" -c "import os; from huggingface_hub import HfApi; HfApi(token=os.environ[\"HF_TOKEN\"]).upload_file(path_or_fileobj=\"/scratch/simplerl_v4.tar.gz\", path_in_repo=\"env_snapshots/simplerl_v4.tar.gz\", repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\"); print(\"[builder] uploaded env_snapshots/simplerl_v4.tar.gz\")"
        echo "[builder] DONE"
        '
