# MSR cluster reality: Singularity H100x4 Standard-tier, 6h preemption windows,
# checkpoints relayed through HF between windows. Secrets come ONLY from .env /
# job env (HF_TOKEN, WANDB_API_KEY, GH_TOKEN) — never write tokens into configs.
#
# On this infra, TRAINING jobs are SUBMITTED via the repo-root amlt yamls
# (h100std_pmishift.yaml, h100std_base_matched_pipeline.yaml, ...), which
# bootstrap the node (scripts/bootstrap_sdc_node.sh), pull data
# (scripts/pull_parquets.py), pull the resume checkpoint and run the durable
# pusher. run.sh with this infra file is meant to be invoked ON the node after
# bootstrap (or used to print/verify the exact composed command before editing
# an amlt yaml).
schema: metacot-infra-v1
infra: msr_h100x4
run_mode: amlt            # amlt = submission goes through repo-root h100std_*.yaml

gpus: 4
eval_tp_size: 4
gpu_memory_utilization: 0.85

scratch_dir: /scratch
repo_dir: /scratch/metacognition            # code tarball extract target
accelerate_config: configs/accelerate_sft.yaml
train_python: python                        # ptca env python for accelerate/SFT
verl_python: /scratch/conda_envs/simplerl/bin/python   # verl 0.7.1 env (bootstrap_sdc_node.sh)
eval_python: /scratch/conda_envs/simplerl/bin/python   # same env carries vLLM

# Preemption + HF checkpoint relay (survives the 6h windows).
preemption_window_seconds: 21600
env_bootstrap: scripts/bootstrap_sdc_node.sh
hf_relay:
  model_repo: iamseungpil/metacot-h200-triobj-dcpo-v3
  push_script: scripts/push_ckpts_to_hf.py   # background per-file pusher; ALSO do a
                                             # synchronous verified push of the final
                                             # step (background pusher can stall)
  pull_script: scripts/pull_resume_ckpt.py   # pre-launch resume pull; retry, and
                                             # ABORT rather than cold-start if HF has
                                             # steps but the pull landed nothing

smoke: false
