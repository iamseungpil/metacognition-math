description: "E.6b CONF-direction contrastive meta-LOGIT steering on the FULL 1030 (gsm8k500+math500+aime30), gold-free, v8_strict. Matches the canonical 16k eval regime (max_new=16384, temp 0.7, top_p 0.95, k=8) — the SAME hyperparameters as scripts/eval_vllm_1030.py and the R10v2 step300 16k eval. Arms: self(baseline)+conf_down(confidence). 4-GPU data-parallel sharding (CUDA_VISIBLE_DEVICES 0-3, disjoint 1030/4 stride), 3-week window. Tokens via env."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

# inference-only (no checkpoints to mount). Each of the 4 shard processes loads HF (steered meta
# span) + vLLM (continuation) SEQUENTIALLY on its OWN H200 (CUDA_VISIBLE_DEVICES pins one GPU each).

jobs:
  - name: e6_conf1030
    sku: 141G4-H200
    sla_tier: Basic
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 1814400   # 3 weeks — generous; full-1030 4-GPU shard run is ~5-6h
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "REPLACE_WITH_NEW_ASSET_ID"
        WANDB_API_KEY: ${WANDB_API_KEY}
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        CTSD_SFT_V8_STRICT: /scratch/models/v8_meta_inside_strict_sft
        CTSD_REPORTS_DIR: /scratch/reports
        VLLM_WORKER_MULTIPROC_METHOD: spawn
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/reports
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        mkdir -p /scratch/logs
        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        GPU_KEEPER_PID=$!
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"

        # stage v8_strict + pop extra_special_tokens so the tokenizer loads (avoids E20a local fallback).
        mkdir -p /scratch/models
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"v8_strict staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        PYBIN=$${SIMPLERL_DIR}/bin/python

        # (1) node smoke on ONE GPU — validates HF steering fires on meta + vLLM continuation handoff,
        #     for exactly the arms the real run uses (self,conf_down) so the nonzero_inside assert
        #     routes onto the gold-free conf_down arm.
        CUDA_VISIBLE_DEVICES=0 $${PYBIN} -u experiments/probes/e2_contrastive_steering.py \
            --model v8_strict --smoke 4 --arms self,conf_down --alpha 0.6 --out_dir /scratch/reports --tag smoke \
            2>&1 | tee /scratch/logs/e6_conf1030_smoke.log
        SMOKE_RC=$?
        if [ "$${SMOKE_RC}" -ne 0 ]; then echo "[YAML] e6_conf1030 smoke FAILED rc=$${SMOKE_RC}"; exit 1; fi
        echo "[YAML] smoke OK — launching 4-GPU full-1030 shards"

        # free the GPU-keeper so all 4 H200s are available to the shard processes.
        kill $${GPU_KEEPER_PID} 2>/dev/null; pkill -f gpu_keeper.py 2>/dev/null; sleep 5

        # (2) FULL 1030, conf-only, 4-GPU data-parallel: shard i pinned to GPU i. --n_pool 2000 makes
        #     representative_pool return ALL 1030 (per-stratum cap >= 500); --n 1030 prevents early-break;
        #     --shard i --n_shards 4 takes the disjoint pool[i::4] stride. Same 16k/0.7/0.95/k8 regime.
        for i in 0 1 2 3; do
          CUDA_VISIBLE_DEVICES=$${i} $${PYBIN} -u experiments/probes/e2_contrastive_steering.py \
              --model v8_strict --phase 2 --arms self,conf_down --alpha 0.6 \
              --n_pool 2000 --n 1030 --k 8 --max_new 16384 --shard $${i} --n_shards 4 \
              --out_dir /scratch/reports --tag conf1030 \
              > /scratch/logs/e6_conf1030_shard$${i}.log 2>&1 &
        done
        wait
        echo "[YAML] all 4 shards done"

        # (3) merge the 4 disjoint shard JSONLs -> powered aggregate (per-arm acc/ECE/calib + paired
        #     Δ-vs-self with bootstrap CI + permutation p).
        $${PYBIN} -u experiments/probes/e2_merge_shards.py \
            --glob "/scratch/reports/e2_steering_v8_strict_conf1030_shard*.jsonl" \
            --out /scratch/reports/e2_steering_v8_strict_conf1030_merged.json \
            --merged_jsonl /scratch/reports/e2_steering_v8_strict_conf1030_merged.jsonl \
            2>&1 | tee /scratch/logs/e6_conf1030_merge.log
        MERGE_RC=$?

        # (4) upload merged report + raw shards to HF dataset.
        python -c "
        from huggingface_hub import upload_file
        import os, glob
        for f in sorted(glob.glob(\"/scratch/reports/e2_steering_v8_strict_conf1030*\")):
            upload_file(path_or_fileobj=f, path_in_repo=f\"reports/{os.path.basename(f)}\",
                        repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"])
            print(\"uploaded\", f)
        " || echo "[YAML] upload skipped"

        if [ "$${MERGE_RC}" -ne 0 ]; then echo "[YAML] merge failed, exit 1"; exit 1; fi
        echo "[YAML] e6_conf1030 DONE"
        '
