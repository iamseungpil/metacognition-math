description: "S3B v2 COUNTERFACTUAL difficulty eval (gs50) — the keystone north-star test. Pulls the v2 forming-sustain RL checkpoint global_step_50 -> verl.model_merger FSDP->HF -> eval_counterfactual_difficulty.py: each of the 594 val problems decoded TWICE under identical weights/prompt/greedy, arm A normal vs arm B with the <|meta|> open token logit-biased to -inf (no meta block can start). acc_with - acc_without is reported STRATIFIED by difficulty (easy/medium/hard) x scenario (verify/redirect) — the test of whether USEFUL metacognition causally raises accuracy (expected: Δ~0 on easy gsm8k, Δ>0 on hard MATH/omni + redirect). vLLM 2-arm batched (minutes). Standard-tier 80G4-H100 (same regime as v1/v2 training; gets a node fast). vLLM eval is short so a preempt window covers it. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: s3b_cf_eval
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 43200
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "449923427"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        HF_HUB_DISABLE_XET: "1"
        CONFIG_NAME: triobj_dcpo_v4_stage3b_v2_h100_4x4k
        GS: "50"
        REPO: iamseungpil/metacot-h200-triobj-dcpo-v3
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python
        pip uninstall -y hf_xet 2>&1 | tail -1 || true

        # 0. pull the meta-mix val parquet (has split_tags.difficulty/scenario + ground_truth).
        $${PYBIN} /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3
        VAL=/scratch/metacognition/data/verl_val_meta_mix.parquet
        ls -la $${VAL} || { echo "[YAML] val parquet missing"; exit 1; }

        # 1. download the v2 forming-sustain checkpoint global_step_50.
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os
        cfg=os.environ[\"CONFIG_NAME\"]; gs=os.environ[\"GS\"]
        snapshot_download(repo_id=os.environ[\"REPO\"], repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/\"+cfg+\"/global_step_\"+gs+\"/**\"], local_dir=\"/scratch\")
        print(\"gs\"+gs+\" downloaded\")
        "
        CKPT=/scratch/checkpoints/$${CONFIG_NAME}/global_step_$${GS}/actor
        MERGED=/scratch/eval_results/merged_v2_gs50
        OUT=/scratch/eval_results/cf_difficulty_v2_gs50.jsonl
        mkdir -p $${MERGED}

        # 2. merge FSDP shards -> HF format (verl, simplerl env).
        $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPT} --target_dir $${MERGED}
        MERGE_RC=$$?
        if [ "$${MERGE_RC}" -ne 0 ]; then echo "[YAML] merge FAILED rc=$${MERGE_RC}"; exit 1; fi

        # 3. patch tokenizer (pop extra_special_tokens so it loads cleanly).
        $${PYBIN} -c "
        import json, os
        p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tok patched\")
        "

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # 4. counterfactual 2-arm eval (vLLM, all 594, greedy, meta-open banned in arm B).
        $${PYBIN} -m src.eval.eval_counterfactual_difficulty \
          --model_path $${MERGED} --val_parquet $${VAL} --out $${OUT} \
          --tp_size 4 --max_new_tokens 2048 \
          2>&1 | tee /scratch/eval_results/cf_eval.log
        EVAL_RC=$$?
        if [ "$${EVAL_RC}" -ne 0 ]; then echo "[YAML] cf eval FAILED rc=$${EVAL_RC}"; exit 1; fi

        # 5. stratified summary (printed to log = the headline result).
        echo "================ CF DIFFICULTY SUMMARY ================"
        $${PYBIN} -m src.eval.eval_counterfactual_difficulty_summarize --jsonl $${OUT} 2>&1 | tee /scratch/eval_results/cf_summary.txt
        echo "======================================================"

        # 6. upload jsonl + summary to the dataset for durable retrieval.
        $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os
        api=HfApi()
        for fn in [\"$${OUT}\", \"/scratch/eval_results/cf_summary.txt\", \"/scratch/eval_results/cf_eval.log\"]:
            try:
                api.upload_file(path_or_fileobj=fn, path_in_repo=\"eval/s3b_cf_difficulty_v2_gs50/\"+os.path.basename(fn),
                    repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"])
            except Exception as e: print(\"upload skip\", fn, str(e)[:80])
        print(\"cf eval uploaded\")
        " || echo "[YAML] upload skipped"
        echo "[YAML] s3b_cf_eval DONE"
        sleep 600
        '
