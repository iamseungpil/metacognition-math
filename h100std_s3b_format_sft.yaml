description: "S3B FORMAT-SFT — re-prime the v8_strict Meta SFT checkpoint on the fixed-template meta data (data/v8_meta_template_sft.parquet) with the meta-token embedding transplant (S3B_META_EMB_TRANSPLANT=1), low LR (5e-6), 1 epoch. Form-only nudge: makes the <|meta|>...<|/meta|> close position predictable so the meta channel survives RL instead of plain-ifying. Init = staged v8_meta_inside_strict_sft/checkpoint-254. Pushes checkpoints/v8_s3b_format_primed to iamseungpil/metacot under models/v8_s3b_format_primed/. Does NOT touch s3 data/composition/PMI; the RL stage (s3b) inherits those and starts from this primed checkpoint. Spec: docs/superpowers/specs/2026-06-15-s3b-meta-format-priming-design.md."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: s3b_format_sft
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "448365407"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-math
        WANDB_RUN_GROUP: dcpo_v4_s3b_priming
        WANDB_NAME: v8_s3b_format_primed
        WANDB_TAGS: S3B,format-sft,meta-template,emb-transplant,priming
        # ── s3b priming knob: re-seed <|meta|>/<|/meta|> from <think>/</think> ──
        S3B_META_EMB_TRANSPLANT: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        # format-SFT runs in the simplerl env — the complete training stack
        # (accelerate + deepspeed + transformers). ptca has NO `accelerate`, so we
        # MUST prepend SIMPLERL_DIR/bin to PATH (same pattern as the working
        # meta_rod SFT yamls). The earlier "use bare ptca accelerate" edit was the
        # regression that caused rc=127 (accelerate: command not found).
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        # accelerate_sft.yaml uses DeepSpeed ZeRO-3; ensure deepspeed is importable.
        python -c "import deepspeed" 2>/dev/null || pip install -q deepspeed 2>&1 | tail -1
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage the v8_strict SFT as the FORMAT-SFT init checkpoint ──────────
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"format-SFT init staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/v8_s3b_format_primed --repo_id iamseungpil/metacot --token $${HF_TOKEN} --interval 90 --config_name v8_s3b_format_primed > /scratch/logs/push_s3b_sft.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # Format-SFT: templated meta data + embedding transplant (S3B_META_EMB_TRANSPLANT=1),
        # low LR / 1 epoch -> nudge the meta FORM only, init = staged v8_strict SFT.
        python -m accelerate.commands.launch --config_file configs/accelerate_sft.yaml \
            src/training/sft.py --config configs/sft_v8_s3b_format_primed.yaml
        SFT_RC=$$?
        echo "[YAML] s3b format-sft rc=$${SFT_RC}"
        # ── push the primed model to the DATASET repo at models/v8_s3b_format_primed/
        #    (exactly where the RL stage reads it via snapshot_download). push_models_hf.py
        #    uploads to models/<name>/ on the dataset repo and skips checkpoint-*/optimizer.
        #    Wrap in a verify+retry loop: HF 429 can silently drop LFS shards, so re-run
        #    until all 4 weight shards are durably on HF (survives later node preemption).
        for i in 1 2 3 4 5 6 7 8; do
            python /scratch/metacognition/scripts/push_models_hf.py --model_path /scratch/checkpoints/v8_s3b_format_primed --model_name v8_s3b_format_primed 2>&1 | tail -8
            N=$$(python -c "from huggingface_hub import HfApi;import os;fs=HfApi().list_repo_files('iamseungpil/metacot',repo_type='dataset',token=os.environ['HF_TOKEN']);print(sum(1 for f in fs if 'v8_s3b_format_primed/model-' in f and f.endswith('.safetensors')))")
            echo "[YAML][push] attempt $$i: shards_on_hf=$$N/4"
            [ "$$N" = "4" ] && echo "[YAML][push] all 4 shards durable on HF dataset models/" && break
            sleep 90
        done
        sleep 86400
        '
