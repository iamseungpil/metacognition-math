# veRL-native shared-preserve SDC — H100 x4 4k-response overlay
# Kept slightly more conservative than H200 on rollout memory while preserving
# the same 4k training regime and single-node topology.
defaults:
  - verl_sdc_e21r_shared
  - _self_

data:
  max_response_length: 4096
  train_batch_size: 64  # e21r v2 exact match
  val_batch_size: 16

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 8
    ppo_micro_batch_size_per_gpu: 1
    ppo_max_token_len_per_gpu: 24576
  ref:
    log_prob_micro_batch_size_per_gpu: 4  # 64*4/4 = 64 per-GPU; /tp4 = 16; micro divides 16
    log_prob_max_token_len_per_gpu: 24576
  rollout:
    # TP=4: single vLLM async-server with model sharded across 4 GPUs.
    # TP=1 caused 4 replicas to load the model 4× → K8s pod CPU OOM (exit 2).
    tensor_model_parallel_size: 4
    temperature: 0.6
    top_k: 20
    top_p: 0.95
    response_length: ${data.max_response_length}
    gpu_memory_utilization: 0.45  # leave headroom for co-tenant on GPU 0 (e.g. llm_addiction steering ~18GB)
    max_model_len: 4608
    max_num_batched_tokens: 8192
    max_num_seqs: 32
    log_prob_micro_batch_size_per_gpu: 4  # 64*4/4=64; /tp4=16; micro divides 16
    n: 4

critic:
  ppo_micro_batch_size_per_gpu: 1
  forward_micro_batch_size_per_gpu: 1
  ppo_max_token_len_per_gpu: 24576
  forward_max_token_len_per_gpu: 24576

reward_model:
  micro_batch_size: 4

trainer:
  nnodes: 1
  n_gpus_per_node: 4
  device: cuda
  experiment_name: verl_sdc_h200_fixed_0427
  default_local_dir: /scratch/checkpoints/verl_sdc_e21r_shared_h100_4x4k
  save_freq: 50
  test_freq: 50
