# Evaluation configuration
models:
  - name: qwen2.5-7b-base
    path: Qwen/Qwen2.5-7B-Instruct
  - name: math-sft-only
    path: /scratch/metacognition/checkpoints/phase1_sft
  - name: meta-cot-mcrl
    path: /scratch/metacognition/checkpoints/phase2_grpo/final
  - name: deepseek-r1-distill-7b
    path: deepseek-ai/DeepSeek-R1-Distill-Qwen-7B

benchmarks:
  - name: aime2025
    dataset: opencompass/AIME2025
    split: test
  - name: aime2024
    dataset: math-ai/aime24
    split: train
  - name: math_test
    dataset: hendrycks/competition_math
    split: test
  - name: olympmath
    dataset: RUCAIBox/OlymMATH
    split: test

tensor_parallel_size: 4
gpu_memory_utilization: 0.90
max_model_len: 4096
temperature: 0.7
top_p: 0.95
max_tokens: 2048
num_samples: 8

output_dir: /scratch/metacognition/results
wandb_project: metacot-math
