# veRL 0.7.1 confidence-centered redirect pilot config
# Preserves legacy E21 while making E21R launchable on the old custom-reward path.

defaults:
  - ppo_trainer

actor_rollout_ref:
  model:
    path: checkpoints/v8_meta_inside_E20a
  actor:
    use_kl_loss: True
    kl_loss_coef: 0.002
    optim:
      lr: 5e-7
  rollout:
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.5
    n: 4
    temperature: 0.7
    top_p: 0.95
    response_length: 4096
    prompt_length: 512

data:
  train_files: data/verl_train_redirect.parquet
  val_files: data/verl_val_redirect.parquet
  max_prompt_length: 512
  max_response_length: 4096
  train_batch_size: 128

algorithm:
  adv_estimator: gdpo
  gdpo_reward_keys: [correctness, confidence_revision, redirect_execution, verify_execution, meta_floor, meta_count_bonus]
  use_kl_in_reward: False

reward:
  custom_reward_function:
    path: src/training/verl_reward.py
    name: compute_score_confidence_centered

trainer:
  total_epochs: 20
  project_name: metacot-math
  experiment_name: verl_e21r_gdpo
  nnodes: 1
  n_gpus_per_node: 4
  save_freq: 100
  test_freq: 50
