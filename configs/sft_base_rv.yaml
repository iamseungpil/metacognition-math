# Base SFT-2: meta-REMOVED twin of sft_rv_functional.yaml (Approach A, spec 2026-06-29).
# Same problems / same final answers as the meta rv_functional corpus, but with the
# <|meta|>...<|/meta|> blocks + conf/verify-only turns stripped (B1's output:
# data/v8_base_rv_sft.parquet). Every non-meta hyperparam is IDENTICAL to the meta
# rv_functional SFT (lr 1e-5, 3 epochs, bs1 x ga4, max_length 4096, save per epoch),
# so v8_base_rv_sft differs from v8_rv_functional_sft ONLY by the absence of meta.
# Init = the staged v8_base_matched_strict_sft checkpoint (the matched base SFT-1 twin
# of v8_meta_inside_strict_sft; <|meta|> tokens still in vocab, never emitted).
# sft.py masks prompt+wrong_prefix (segment_loss_mask) and trains only the recovery;
# teacher_kl stays OFF (no teacher_kl block => disabled).
model_name_or_path: /scratch/models/v8_base_matched_strict_sft
dataset_path: data/v8_base_rv_sft.parquet
output_dir: /scratch/checkpoints/v8_base_rv_sft
run_name: v8-base-rv-sft
wandb_project: metacot-math

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
