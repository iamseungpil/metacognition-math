# veRL 0.7.1 E21 GDPO config
# Override the default ppo_trainer.yaml

defaults:
  - ppo_trainer

# Model
actor_rollout_ref:
  model:
    path: checkpoints/v8_meta_inside_E20a
  actor:
    use_kl_loss: True
    kl_loss_coef: 0.002
    optim:
      lr: 5e-7
  rollout:
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.5
    n: 4
    temperature: 0.7
    top_p: 0.95
    response_length: 4096
    prompt_length: 512

# Data
data:
  train_files: data/verl_train.parquet
  val_files: data/verl_val.parquet
  max_prompt_length: 512
  max_response_length: 4096
  train_batch_size: 128

# Algorithm - GDPO
algorithm:
  adv_estimator: gdpo
  gdpo_reward_keys: [correctness, switch_v2, verify_v2, conf_traj, meta_floor]
  use_kl_in_reward: False

# Reward - our custom function
reward:
  custom_reward_function:
    path: src/training/verl_reward.py
    name: compute_score

# Trainer
trainer:
  total_epochs: 20
  project_name: metacot-math
  experiment_name: verl_e21_gdpo
  nnodes: 1
  n_gpus_per_node: 4
  save_freq: 100
  test_freq: 50
