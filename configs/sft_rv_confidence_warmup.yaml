# Warm-up SFT for the confidence redirect/verify corpus (Stage-1).
# Teaches the student to emit a <|meta|> JUDGMENT (calibrated confidence + decision:
# redirect|verify) before solving, anchored on its OWN real rollouts. Init = the
# staged v8_meta_inside_strict_sft checkpoint (the <|meta|>/<|/meta|> tokens already
# exist). The redirect rows carry a wrong_prefix; sft.py masks prompt+wrong_prefix and
# trains only meta+recovery (segment_loss_mask) — teacher_kl MUST stay OFF (it keys off
# a single prompt_len boundary and would re-introduce loss on the masked prefix).
# This is the warm start the DCPO triobj RL (R_corr + R_meta(PMI) + R_cal) builds on.
model_name_or_path: /scratch/models/v8_meta_inside_strict_sft
dataset_path: data/rv_confidence_sft.parquet
output_dir: /scratch/checkpoints/v8_rv_confidence_warmup
run_name: v8-rv-confidence-warmup-sft
wandb_project: metacot-math

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
