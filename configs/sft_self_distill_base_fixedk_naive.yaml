# Base strict-SFT -> fixed-K self-distill baseline.
model_name_or_path: checkpoints/v8_base_matched_strict_sft
dataset_path: results/self_distill/base_fixedk_naive/online_sdpo_regen.parquet
output_dir: checkpoints/self_distill_base_fixedk_naive
run_name: self-distill-base-fixedk-naive
wandb_project: metacot-math

num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-6
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
