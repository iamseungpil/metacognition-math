# Meta strict-SFT -> fixed-K claim-bearing epistemic self-distill with control-span teacher KL.
model_name_or_path: checkpoints/v8_meta_inside_strict_sft
dataset_path: results/self_distill/meta_fixedk_epistemic/teacher_topk_targets.parquet
output_dir: checkpoints/self_distill_meta_fixedk_epistemic_kl
run_name: self-distill-meta-fixedk-epistemic-kl
wandb_project: metacot-math

num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-6
max_length: 4096
save_strategy: epoch
eval_strategy: "no"

teacher_kl:
  enabled: true
  coef: 0.15
  meta_weight: 1.0
  diagnosis_weight: 1.25
  study_need_weight: 1.4
  recovery_weight: 0.7
  verify_weight: 1.1
