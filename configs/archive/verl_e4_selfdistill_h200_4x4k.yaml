# E.4 Self-Distill RL with Contrastive Teacher — base config (4 arms via override).
# plan_ctsd_E4_selfdistill_rl_2026_06_03.
#
# Intent: does a contrastive-teacher DIRECTION, used as verl_sdc advantage-shaping
# on the self-emitted meta region (sign from RLVR correctness, magnitude from the
# teacher), make Meta-CoT > Base SFT — and which direction? E.3 ranked the
# directions at inference; E.4 runs the RL A/B on the cluster.
#
# ONE base config + per-arm CLI overrides (the launcher passes hydra overrides):
#   e4_baseline      : mode=VANILLA_GRPO algorithm.sdc_mode=VANILLA_GRPO
#                      algorithm.sdc_enabled=false algorithm.sdc_beta_contrast=0
#                      → plain GRPO control (teacher OFF; VANILLA early-returns).
#   e4_gold_decoy    : algorithm.sdc_contrast_variant=decoy   (T+=gold, T-=decoy)
#   e4_gold_stance   : algorithm.sdc_contrast_variant=stance  (gold both sides + CAUTIOUS/CONFIDENT)
#   e4_gold_conf_down: algorithm.sdc_contrast_variant=conf    (gold both sides + confidence 0.15/0.95)
#
# This mirrors verl_ctsd_inject_C_h200_4x4k.yaml but WITHOUT force-inject — E.4
# uses RLSD_META_CONTRAST (faithful per-token; see `mode` below) on v8_strict's
# self-emitted meta (~32%), NOT the NotImplemented force-inject path.

defaults:
  - verl_sdc_e21r_shared
  - _self_

# E.4 ROOT-CAUSE FIX (2026-06-03): was ROD_MQ_CONTRAST, which MEAN-POOLS the
# per-token teacher gains to a single [B,1] per-SEQUENCE scalar applied uniformly
# over the whole meta region — diluting the discriminative meta tokens (signal
# lives in the p95, mean≈0) so the teacher gap collapsed to ~e-5 across ALL arms
# (incl decoy) → w_meta≈1 → teacher modulation negligible → contrastive thesis
# untestable. RLSD_META_CONTRAST is the FAITHFUL per-token mode: w_meta is a
# [B,T] PER-TOKEN factor with ZERO mean/sum aggregation (verl_sdc_utils.py
# L355-362). Same reward heads [correctness, meta_penalty] [1.0,1.0], same
# alpha/beta keys (sdc_alpha_attr=1.0 / sdc_beta_contrast=0.5). This single line
# (the single source of truth — verl_sdc.py L2014 overwrites algorithm.sdc_mode
# with this `mode` at runtime) flips all 3 teacher arms (decoy/stance/conf) to
# faithful per-token RLSD at once; the baseline arm overrides mode=VANILLA_GRPO
# in the launcher so is UNAFFECTED.
mode: RLSD_META_CONTRAST

data:
  max_prompt_length: 2048
  max_response_length: 4096
  train_batch_size: 64
  val_batch_size: 16

actor_rollout_ref:
  model:
    path: /scratch/models/v8_meta_inside_strict_sft   # SFT_V8_STRICT cold start
  actor:
    ppo_mini_batch_size: 8
    ppo_micro_batch_size_per_gpu: 1
    ppo_max_token_len_per_gpu: 24576
  ref:
    log_prob_micro_batch_size_per_gpu: 4
    log_prob_max_token_len_per_gpu: 24576
  rollout:
    tensor_model_parallel_size: 4
    temperature: 0.6
    top_k: 20
    top_p: 0.95
    response_length: ${data.max_response_length}
    gpu_memory_utilization: 0.45
    max_model_len: 4608
    max_num_batched_tokens: 8192
    max_num_seqs: 32
    log_prob_micro_batch_size_per_gpu: 4
    n: 4

critic:
  ppo_micro_batch_size_per_gpu: 1
  forward_micro_batch_size_per_gpu: 1
  ppo_max_token_len_per_gpu: 24576
  forward_max_token_len_per_gpu: 24576

reward_model:
  micro_batch_size: 4

algorithm:
  gdpo_reward_keys: [correctness, meta_penalty]
  gdpo_reward_weights: [1.0, 1.0]
  kl_ctrl:
    type: fixed
    kl_coef: 0.005
  # RLSD_META_CONTRAST: faithful per-token RLSD (α attractive + β contrast),
  # NO force-inject (force-inject stays NotImplemented; we use self-emitted meta).
  # NOTE: this value is FUNCTIONALLY A NO-OP — verl_sdc.py L2014 overwrites
  # algorithm.sdc_mode at runtime with the top-level `mode` (the single source of
  # truth). Kept in sync so a future config audit does not mis-read the run as the
  # diluted ROD_MQ_CONTRAST mode.
  sdc_mode: RLSD_META_CONTRAST
  sdc_enabled: true
  sdc_lambda_meta: 0.5
  sdc_lambda_shared: 0.0
  sdc_lambda_diff: 0.0
  sdc_alpha_attr: 1.0        # α — attractive (T+ − student) on the meta region
  sdc_beta_contrast: 0.5     # β — contrast (T+ − T-), > 0 for the teacher arms
  sdc_clip_eps_w: 0.2        # conservative — avoid R10v2 length pathology
  sdc_meta_quality_tau: 1.0
  sdc_meta_post_k: 10
  sdc_log_ratio_clamp: 10.0
  # E.4 contrast variant (plan_ctsd_E4_selfdistill_rl). MUST exist here so the
  # per-arm CLI override does not hit an omegaconf struct-key error. Default
  # `decoy` = the existing teacher path (byte-identical). Overridden per arm.
  sdc_contrast_variant: decoy

trainer:
  nnodes: 1
  n_gpus_per_node: 4
  device: cuda
  project_name: skilldiscovery2          # match the amlt WANDB_PROJECT
  experiment_name: verl_e4_selfdistill_h200_4x4k
  default_local_dir: /scratch/checkpoints/verl_e4_selfdistill_h200_4x4k
  logger: ['console', 'wandb']
  save_freq: 5               # frequent — H200 preempt resilience
  test_freq: 25              # eval GSM8K/MATH/AIME + ECE to wandb
  total_epochs: 20
  total_training_steps: 300  # Phase E scale
