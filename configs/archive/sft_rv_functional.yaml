# Functional-redirect/verify SFT (Stage-1, 0623 verify-fixed corpus).
# Same recipe as sft_rv_confidence_warmup.yaml but trained on the GPU-free
# teacher-distill corpus regenerated AFTER the 0622 data review:
#   - redirect rows: anchored on the student's REAL wrong rollout (loss-masked
#     wrong_prefix), genuine method switch -> correct answer (causal-filtered).
#   - verify rows: NOW include the student's CORRECT solve as the masked prefix
#     (the 0623 fix) so the candidate the check judges is derived in-trace, not
#     materialized. sft.py masks prompt+wrong_prefix and trains only meta+recovery
#     (segment_loss_mask); teacher_kl MUST stay OFF.
# Init = the staged v8_meta_inside_strict_sft checkpoint (the <|meta|> tokens exist),
# the SAME base the old warm-up used, so v8_rv_functional_sft is a drop-in
# replacement for v8_rv_confidence_warmup as the DCPO RL warm start.
model_name_or_path: /scratch/models/v8_meta_inside_strict_sft
dataset_path: data/rv_redirect_verify_functional.parquet
output_dir: /scratch/checkpoints/v8_rv_functional_sft
run_name: v8-rv-functional-sft
wandb_project: metacot-math

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
