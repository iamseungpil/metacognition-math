# M5.6.5 v2 ROD-RLSD config (post-codex consensus, plan §9 v5.4 update).
# Cold start: base meta SFT (NOT R5 step 300). Soft Bernoulli BCE + sampled positions.

# Cold start = base meta SFT (no force, gold-conditioned natural training)
student_init: "PLACEHOLDER_BASE_SFT_PATH"   # patched at runtime to /scratch/models/v8_meta_inside_strict_sft
teacher_init: "PLACEHOLDER_TEACHER_PATH"     # patched at runtime to /scratch/models/v8_meta_inside_strict_sft

privileged_answer: true
mask_mode: "meta_only"

clip_eps_w: 0.2
clip_eps_low: 0.2
clip_eps_high: 0.28

lambda_init: 0.0
lambda_final: 0.0
lambda_decay_steps: 1
teacher_sync_freq: 10000
warmup_steps: 5

lr: 5.0e-7
kl_coef: 0.0
entropy_coef: 0.0

num_rollouts: 4
temperature: 0.6
top_p: 0.95
top_k: 20
max_response_length: 4096
prompt_length: 2048

batch_size: 64
total_steps: 100
seed: 42

train_data: "data/verl_train_redirect.parquet"
val_data: ""
output_dir: "checkpoints/meta_rod_v2_R9"

# Meta floor reward DISABLED (codex review: fights on-demand objective).
# Replaced by per-rollout emit_rate_penalty (γ * (EMA(p_T) - actual_rate)²).
reward_meta_no_penalty: 0.0
reward_meta_no_penalty_strength: "soft"
reward_meta_short_bonus: 0.0
reward_meta_full_bonus: 0.0
meta_min_length_tokens: 20

log_grad_norm_clip: 1.0
log_ratio_clamp: 10.0
eval_interval: 25
save_interval: 25

use_vllm: true
vllm_tensor_parallel_size: 4
vllm_gpu_memory_utilization: 0.5

# OPD parent disabled
opd_alpha: 0.0
opd_lambda_pos: 0.0
opd_lambda_neg: 0.0
opd_topk: 64
opd_topk_fallback: 32
opd_temperature: 1.0
opd_meta_only: true
opd_decoy_seed: 42
opd_kl_neg_cap: 5.0
opd_forced_meta_assert: false

# v2: soft BCE + sampled positions + emit-rate constraint
rod_alpha_emit: 0.5
rod_beta_content: 0.3
rod_gamma_rate: 0.1
rod_v2_n_sampled: 16
rod_v2_min_pos: 8
rod_v2_seed: 42
rod_v2_target_rate_ema: 0.05
rod_v2_target_rate_alpha: 0.95

variant: "m5_6_5_rod_v2"
report_to: "wandb"
run_name: "meta_rod_v2_R9_h100_4x4k"
