# s3b format-SFT: re-prime the v8_strict Meta SFT checkpoint on the FIXED-TEMPLATE
# meta data (data/v8_meta_template_sft.parquet) so the close position becomes
# predictable. Low LR + 1 epoch = nudge form only, do not relearn the task.
# Init = the staged v8_meta_inside_strict_sft checkpoint (NOT raw Qwen3-8B), so the
# added <|meta|>/<|/meta|> tokens already exist; the embedding transplant
# (S3B_META_EMB_TRANSPLANT=1) re-seeds them from <think>/</think> before this pass.
model_name_or_path: /scratch/models/v8_meta_inside_strict_sft
dataset_path: data/v8_meta_template_sft.parquet
output_dir: /scratch/checkpoints/v8_s3b_format_primed
run_name: v8-s3b-format-primed-sft
wandb_project: metacot-math

num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 5.0e-6
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
