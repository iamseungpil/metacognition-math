# H200 x4 tuned config: meta strict-SFT -> question-only best-of-N scored (`correct_then_meta`) self-distill.
model_name_or_path: checkpoints/v8_meta_inside_strict_sft
dataset_path: results/self_distill/meta_qonly_epistemic_scored/online_sdpo_regen.parquet
output_dir: checkpoints/self_distill_meta_qonly_epistemic_scored_h200_4gpu
run_name: self-distill-meta-qonly-epistemic-scored-h200-4gpu
wandb_project: metacot-math

num_train_epochs: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-6
