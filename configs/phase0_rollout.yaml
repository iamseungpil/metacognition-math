# Phase 0: Rollout generation
model: Qwen/Qwen2.5-7B-Instruct
output_dir: /scratch/metacognition/rollouts

rollouts_per_problem: 8
batch_size: 128

sampling:
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2048

vllm:
  tensor_parallel_size: 4
  gpu_memory_utilization: 0.90
  max_model_len: 4096

data:
  use_numina: true
  numina_max: 15000
  use_omni: true
  use_openmr: true
  openmr_max: 10000
  math_max: null  # use all 7500
