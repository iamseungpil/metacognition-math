# Phase 0: Rollout generation with vLLM (4-GPU tensor parallel)
model: Qwen/Qwen2.5-7B-Instruct
output_dir: /scratch/metacognition/rollouts

rollouts_per_problem: 8
batch_size: 128  # vLLM handles large batches efficiently

sampling:
  temperature: 0.7
  top_p: 0.95
  max_tokens: 2048

vllm:
  tensor_parallel_size: 1  # Single GPU to avoid CUDA fork issue with torch 2.5.1
  gpu_memory_utilization: 0.90
  max_model_len: 4096

data:
  use_numina: true
  numina_max: 5000
  use_omni: false
  use_openmr: false
  math_max: 2000
