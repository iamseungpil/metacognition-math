# Phase 0: Rollout generation
model: Qwen/Qwen2.5-7B-Instruct
output_dir: /scratch/metacognition/rollouts

rollouts_per_problem: 8
batch_size: 8  # HF generate, smaller batches (device_map=auto across 4 GPUs)

sampling:
  temperature: 0.7
  top_p: 0.95
  max_tokens: 1024  # reduced for faster iteration; can increase later

data:
  use_numina: true
  numina_max: 5000   # start smaller for first run, scale up after validation
  use_omni: false     # add after first run succeeds
  use_openmr: false   # add after first run succeeds
  math_max: 2000      # start with 2000 MATH problems
