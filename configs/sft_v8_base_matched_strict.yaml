# V8 strict paired base SFT from the raw base model.
model_name_or_path: Qwen/Qwen3-8B
dataset_path: data/v8_base_matched_strict.parquet
output_dir: checkpoints/v8_base_matched_strict_sft
run_name: v8-base-matched-strict-sft
wandb_project: metacot-math

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-6
max_length: 4096
save_strategy: epoch
eval_strategy: "no"
