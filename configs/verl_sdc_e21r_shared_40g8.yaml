# veRL-native shared-preserve SDC — A100 40GB × 8 overlay
# Inherits all defaults from verl_sdc_e21r_shared.yaml; only overrides fit-to-40GB knobs.
# Use with: --config-name=verl_sdc_e21r_shared_40g8
# Or via Hydra compose in verl_sdc.py entrypoint.
defaults:
  - verl_sdc_e21r_shared
  - _self_

data:
  train_batch_size: 32

actor_rollout_ref:
  actor:
    ppo_mini_batch_size: 8
    ppo_micro_batch_size_per_gpu: 1
    ppo_max_token_len_per_gpu: 8192
    ulysses_sequence_parallel_size: 1
  ref:
    log_prob_micro_batch_size_per_gpu: 8
  rollout:
    tensor_model_parallel_size: 2
    gpu_memory_utilization: 0.50
    max_model_len: 5120
    # vLLM requires max_num_batched_tokens >= max_model_len.
    # Keep the budget tight on 40GB cards and reduce concurrent seqs instead.
    max_num_batched_tokens: 6144
    max_num_seqs: 32
    log_prob_micro_batch_size_per_gpu: 8
    n: 2

critic:
  ppo_micro_batch_size_per_gpu: 1
  forward_micro_batch_size_per_gpu: 1
  ppo_max_token_len_per_gpu: 16384

reward_model:
  micro_batch_size: 4

trainer:
  nnodes: 1
  n_gpus_per_node: 8
  device: cuda
  experiment_name: verl_sdc_e21r_shared_40g8
  default_local_dir: /scratch/checkpoints/verl_sdc_e21r_shared_40g8
  save_freq: 50
  test_freq: 25
