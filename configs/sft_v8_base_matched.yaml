# Base SFT matched: same 6329 problems as V8 but NO meta blocks
# Intent: Fair baseline for meta-RL comparison
model_name_or_path: checkpoints/qwen3_base_sft
dataset_path: data/v8_base_matched_clean.parquet
output_dir: checkpoints/v8_base_matched_clean_sft
run_name: v8-base-matched-clean-sft
wandb_project: metacot-math

num_train_epochs: 3
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 2.0e-6
max_length: 4096
save_strategy: epoch
