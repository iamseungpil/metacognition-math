# Phase 2: Stepwise GRPO with <|meta|> boundaries
model_path: /scratch/metacognition/checkpoints/meta_sft
problems_path: /scratch/metacognition/rollouts/rollouts_final.parquet
output_dir: /scratch/metacognition/checkpoints/meta_grpo

# GRPO params
group_size: 4
max_steps: 200
learning_rate: 5.0e-6
max_tokens: 512

# Stepwise reward weights
lambda1: 0.5    # R_calibration weight
lambda2: 0.3    # R_progress weight

# Gnosis probe
probe_path: /scratch/metacognition/checkpoints/probe_meta_sft

# Checkpointing
save_every: 100

wandb_project: metacot-math
run_name: metacot-stepwise-grpo
