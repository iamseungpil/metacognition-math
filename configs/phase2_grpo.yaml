# Phase 2: Stepwise GRPO with Agent Lightning pattern
model_path: /scratch/metacognition/checkpoints/meta_sft
problems_path: /scratch/metacognition/rollouts/rollouts_final.parquet
output_dir: /scratch/metacognition/checkpoints/meta_grpo_v2

# GRPO params
group_size: 4
max_steps: 1000
learning_rate: 5.0e-6
max_tokens: 1024

# Reward weights
lambda_calib: 1.0    # R_calib weight (was 0.5)

# Gnosis probe
probe_path: /scratch/metacognition/checkpoints/probe_meta_sft
hidden_dim: 3584

# Checkpointing
save_every: 200

wandb_project: metacot-math
run_name: metacot-grpo-v2-1000steps
