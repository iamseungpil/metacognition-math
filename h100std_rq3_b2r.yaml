description: "RQ3 B2-R (META-SFT + REGION-SPLIT, META ADVANTAGE = 0) — the clean-isolation control for RQ2. Init = models/b23_rv_unmasked_sft (SAME meta-SFT init as B2/B3pkg). config triobj_dcpo_v4_stage3b (region-split routing: correctness -> ANSWER span only) but ALL meta heads zeroed (dcpo_w_meta=0, w_cal=0, w_emit=0, w_format=0, len_cost=0, trunc_open_penalty=0, w_over=0) so the meta/reasoning span receives ZERO advantage. Purpose: B2-R holds the region-split correctness ROUTING constant while removing the meta reward package, so B3pkg - B2-R isolates the PURE meta-package effect (vs B3pkg - B2 which also changes routing whole-response->answer-span). B2 (VANILLA_GRPO, whole-response correctness) stays the RQ1 control; B2-R is a NEW 4th arm, not a change to B2. Base substrate + v2 collapse-fixed recipe, matched hyperparams. Fresh start from gs0." Collapse-fixed v2 recipe applied identically across all three arms: temp 1.0, top_k -1, top_p 1.0, max_response 8192, max_model_len/max_num_batched_tokens 10240, Dr.GRPO norm_adv_by_std=false, log_prob micro-batch 2 (8192 OOM guard). Matched hyperparams from config: train_batch 64, ppo_mini 8, n 8, lr 1e-6, 300 steps, clip 0.2/0.28, kl 0.0. H100x4 Standard."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: rq3_b2r
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        # PLACEHOLDER_REPACKAGE — human: the collapse-fixed v2 recipe + this launcher live in the
        # repo; the code tarball MUST be RE-PACKAGED and released, then fill this with the GitHub
        # release asset id of the freshly packaged metacognition.tar.gz. DO NOT submit with the
        # placeholder below.
        CODE_TAR_REVISION: "473691945"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-dcpo-v4
        WANDB_RUN_GROUP: rq3_matched_ladder
        WANDB_NAME: rq3_b2r
        WANDB_RUN_ID: rq3-b2r
        WANDB_RESUME: allow
        WANDB_TAGS: RQ3,matched_ladder,B2R,meta_sft,region_split,meta_adv_zero,isolation_control,v2_recipe,from-b23-rv-sft,fresh-gs0
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        DCPO_META_CLOSE_FORCE: "1"
        DCPO_META_CLOSE_N: "96"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        # inline GPU spinner from t~0 (close the Singularity suspend-on-idle window).
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f\"cuda:{i}\", dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        set +x  # do NOT leak GH_TOKEN into xtrace logs
        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        set -x
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        # hard-remove hf_xet (env flag + pip uninstall insufficient — memory hf-xet-pitfall).
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        find $${SIMPLERL_DIR}/lib -maxdepth 3 -name "hf_xet*" -exec rm -rf {} + 2>/dev/null || true
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage the B23 meta-SFT init (RL init + frozen ref worker) from iamseungpil/metacot ──
        # SAME init as B2 (models/b23_rv_unmasked_sft). B3 vs B2 differ ONLY by the added
        # pmi_shift meta head. Must exist under iamseungpil/metacot models/b23_rv_unmasked_sft/
        # (produced by the B23 meta-SFT run) before this launch.
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/b23_rv_unmasked_sft/**\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/b23_rv_unmasked_sft\"; dst=\"/scratch/models/b23_rv_unmasked_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"b23 meta-SFT staged\")
        "
        python -c "
        import json, os; p=\"/scratch/models/b23_rv_unmasked_sft/tokenizer_config.json\"
        if os.path.exists(p):
            cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        # durable per-file checkpoint pusher for this RL run.
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/rq3_b2r --repo_id iamseungpil/metacot-h200-triobj-dcpo-v3 --token $${HF_TOKEN} --interval 90 --config_name rq3_b2r > /scratch/logs/push_rq3_b2r.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF durability for this RL run.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v3 --config_name rq3_b2r --local_dir /scratch/checkpoints/rq3_b2r --token $${HF_TOKEN} 2>&1 | tail -5
        # `amlt run -i` sets LOCAL_RANK='' (empty); export a valid "0" so Ray
        # worker actors inherit a valid value when spawned (memory amlt-i pitfall).
        export LOCAL_RANK=0
        # ── B2-R = META-SFT init + REGION-SPLIT routing, META ADVANTAGE = 0 ──
        # triobj config (correctness routed to ANSWER span) but ALL meta heads zeroed:
        # dcpo_w_meta=0 (no pmi/meta-utility), w_cal=0, w_emit=0, w_format=0, len_cost=0,
        # trunc_open_penalty=0, w_over=0. => meta/reasoning span gets ZERO advantage.
        # Isolation control: B3pkg - B2-R = pure meta-package effect, holding region-split
        # routing constant. (B2 stays VANILLA whole-response correctness for RQ1.)
        # Collapse-fixed v2 recipe overrides (temp 1.0 / top_k -1 / top_p 1.0 /
        # max_response 8192 / max_model_len+max_num_batched_tokens 10240 / Dr.GRPO
        # norm_adv_by_std=false / log_prob micro-batch 2 OOM guard) applied identically
        # to all three arms.
        WANDB_NAME=rq3_b2r /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v4_stage3b_h100_4x4k \
            trainer.experiment_name=rq3_b2r \
            trainer.default_local_dir=/scratch/checkpoints/rq3_b2r \
            trainer.project_name=metacot-dcpo-v4 \
            actor_rollout_ref.model.path=/scratch/models/b23_rv_unmasked_sft \
            ++algorithm.dcpo_w_meta=0.0 \
            ++algorithm.dcpo_w_cal=0.0 \
            ++algorithm.dcpo_w_emit=0.0 \
            ++algorithm.dcpo_len_cost=0.0 \
            ++algorithm.dcpo_w_over=0.0 \
            ++algorithm.dcpo_w_format=0.0 \
            ++algorithm.dcpo_trunc_open_penalty=0.0 \
            actor_rollout_ref.rollout.temperature=1.0 \
            actor_rollout_ref.rollout.top_k=-1 \
            actor_rollout_ref.rollout.top_p=1.0 \
            data.max_response_length=8192 \
            actor_rollout_ref.rollout.max_model_len=10240 \
            actor_rollout_ref.rollout.max_num_batched_tokens=10240 \
            ++algorithm.norm_adv_by_std_in_grpo=false \
            actor_rollout_ref.rollout.log_prob_micro_batch_size_per_gpu=2 \
            actor_rollout_ref.ref.log_prob_micro_batch_size_per_gpu=2 \
            trainer.resume_mode=auto \
            trainer.save_freq=5 \
            ++trainer.val_before_train=False \
            ++hydra.searchpath=[pkg://verl/trainer/config] \
            2>&1 | tee /scratch/logs/verl_main.log
        VERL_RC=$${PIPESTATUS[0]}
        echo "[YAML] verl_sdc rq3_b2r rc=$${VERL_RC}; tail of verl_main.log:"
        tail -40 /scratch/logs/verl_main.log 2>/dev/null
        sleep 86400
        '
