description: "B23 RV-META meta-SFT (matched-arm base experiment, TREATMENT). Init = TRUE pretrained Qwen/Qwen3-8B-Base. Trains on data/b23_rv_unmasked_sft.parquet (RV: nonempty wrong_prefix so sft.py AUTO segment-masks — trains ONLY meta+recovery, wrong prefix masked out of loss). sft.py enforces the EOS invariant (eos=<|im_end|>=151645, pad=<|endoftext|>=151643). 3 epochs, max_length 4096, lr 1e-5. After SFT: (a) scripts/verify_eos_invariant.py on the checkpoint MUST be GREEN, (b) a quick termination eval (eval_vllm_1030.py on a small MATH slice at 8k, --temperature 1.0 = RL rollout temp) measuring truncation% + meta-emission. Pushes checkpoints/b23_rv_unmasked_sft to iamseungpil/metacot under models/b23_rv_unmasked_sft/. H100x4 Standard."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  registry: mcr.microsoft.com
  image: aifx/acpt/stable-ubuntu2204-cu126-py310-torch28x:latest

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: sft_b23_unmasked
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        # PLACEHOLDER_REPACKAGE — human: the new data/b23_rv_unmasked_sft.parquet + configs/sft_b23_unmasked.yaml
        # live in the repo, so the code tarball MUST be RE-PACKAGED after those files exist. Fill this with
        # the GitHub release asset id of the freshly packaged metacognition.tar.gz. DO NOT submit with the
        # placeholder below.
        CODE_TAR_REVISION: "473503943"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-math
        WANDB_RUN_GROUP: matched_arm_base
        WANDB_NAME: b23_rv_unmasked_sft
        WANDB_TAGS: redesign,matched-arm,b23-rv-meta,qwen3-8b-base,segment-masked,eos-invariant
        HF_HUB_DISABLE_XET: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        # inline GPU spinner (close the Singularity suspend-on-idle window from t~0).
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f'cuda:{i}', dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        # env flag + pip uninstall are INSUFFICIENT -> hard-remove hf_xet (memory hf-xet-pitfall).
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        find $${SIMPLERL_DIR}/lib -maxdepth 3 -name "hf_xet*" -exec rm -rf {} + 2>/dev/null || true
        python -c "import deepspeed" 2>/dev/null || pip install -q deepspeed 2>&1 | tail -1

        # ── corpus: data/b23_rv_unmasked_sft.parquet is NOT on HF. It is shipped INSIDE the
        # re-packaged code tarball (see CODE_TAR_REVISION note above) and already extracted to
        # /scratch/metacognition/data/b23_rv_unmasked_sft.parquet by the tar -xzf step above.
        # No hf_hub_download staging step needed for this arm.
        ls -l /scratch/metacognition/data/b23_rv_unmasked_sft.parquet || echo "[YAML][corpus] MISSING b23_rv_unmasked_sft.parquet — did you re-package the tarball?"

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        # durable per-file pusher for the live checkpoint dir.
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/b23_rv_unmasked_sft --repo_id iamseungpil/metacot --token $${HF_TOKEN} --interval 90 --config_name b23_rv_unmasked_sft > /scratch/logs/push_b23_rv_unmasked_sft.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition

        # ── SFT (RV segment-masked: trains only meta+recovery; eos invariant enforced in sft.py) ──
        python -m accelerate.commands.launch --config_file configs/accelerate_sft.yaml \
            src/training/sft.py --config configs/sft_b23_unmasked.yaml
        SFT_RC=$$?
        echo "[YAML] b23-rv-unmasked-sft rc=$${SFT_RC}"

        CKPT=/scratch/checkpoints/b23_rv_unmasked_sft

        # ── GATE 1: EOS invariant on the SAVED checkpoint MUST be GREEN before anything else ──
        python /scratch/metacognition/scripts/verify_eos_invariant.py $${CKPT}
        EOS_RC=$$?
        echo "[YAML][eos-gate] verify_eos_invariant rc=$${EOS_RC} (0=GREEN required)"
        if [ "$${EOS_RC}" != "0" ]; then
            echo "[YAML][eos-gate] RED checkpoint — terminator mismatch. DO NOT launch RL. Skipping eval, still pushing ckpt for forensics."
        else
            # ── GATE 2: quick termination eval (small MATH slice @ 8k) ──
            # --temperature 1.0 measures emission at the RL rollout temperature.
            python /scratch/metacognition/scripts/eval_vllm_1030.py \
                --model_path $${CKPT} \
                --model_name b23_rv_unmasked_sft_term \
                --output_dir /scratch/logs/b23_rv_unmasked_term_eval \
                --benchmarks math500 \
                --max_problems 50 \
                --max_tokens 8192 \
                --max_model_len 10240 \
                --temperature 1.0 \
                --tp_size 4 \
                --num_samples 1
            EVAL_RC=$$?
            echo "[YAML][term-eval] eval_vllm_1030 rc=$${EVAL_RC} (see b23_rv_unmasked_term_eval/*.metadata.json for truncation% + meta_emission_rate)"
        fi

        # ── durable final push (shard-verify loop; HF 429 can silently drop LFS shards) ──
        for i in 1 2 3 4 5 6 7 8; do
            python /scratch/metacognition/scripts/push_models_hf.py --model_path $${CKPT} --model_name b23_rv_unmasked_sft --repo_id iamseungpil/metacot 2>&1 | tail -8
            N=$$(python -c "from huggingface_hub import HfApi;import os;fs=HfApi().list_repo_files('iamseungpil/metacot',repo_type='dataset',token=os.environ['HF_TOKEN']);print(sum(1 for f in fs if 'b23_rv_unmasked_sft/model-' in f and f.endswith('.safetensors')))")
            echo "[YAML][push] attempt $$i: shards_on_hf=$$N/4"
            [ "$$N" = "4" ] && echo "[YAML][push] all 4 shards durable on metacot models/" && break
            sleep 90
        done
        sleep 86400
        '
