description: "Base SFT-2 (Approach A, meta-removed twin of rv_functional). Init = staged v8_base_matched_strict_sft/checkpoint-254 (the matched base SFT-1 twin of v8_meta_inside_strict_sft). Trains on metacot/data/v8_base_rv_sft.parquet (B1's output: rv_redirect_verify_functional with <|meta|> blocks + conf/verify-only turns stripped, same problems/answers). EVERY non-meta hyperparam identical to the meta rv_functional SFT (lr 1e-5, 3 epochs, bs1 x ga4, max_length 4096). sft.py masks prompt+wrong_prefix (segment_loss_mask); teacher_kl OFF. Pushes checkpoints/v8_base_rv_sft to iamseungpil/metacot-rv under models/v8_base_rv_sft/. Drop-in meta-removed twin of v8_rv_functional_sft as the correctness-only GRPO warm start. H100x4 Standard."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: base_rv_sft
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 21600
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        # NOTE: build a NEW release AFTER committing configs/sft_base_rv.yaml and bump this.
        CODE_TAR_REVISION: "460898594"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-math
        WANDB_RUN_GROUP: base_rv
        WANDB_NAME: v8_base_rv_sft
        WANDB_TAGS: base,rv,base-sft2,meta-removed,matched-twin
        HF_HUB_DISABLE_XET: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        # inline GPU spinner (close the Singularity suspend-on-idle window from t~0).
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f'cuda:{i}', dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        # env flag + pip uninstall are INSUFFICIENT -> hard-remove hf_xet (memory hf-xet-pitfall).
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        find $${SIMPLERL_DIR}/lib -maxdepth 3 -name "hf_xet*" -exec rm -rf {} + 2>/dev/null || true
        python -c "import deepspeed" 2>/dev/null || pip install -q deepspeed 2>&1 | tail -1

        # ── stage the v8_base_matched_strict SFT-1 as the base SFT-2 init checkpoint ──
        # BLOCKER: requires base SFT-1 (v8_base_matched_strict_sft) to have been run+pushed
        # to iamseungpil/metacot under models/v8_base_matched_strict_sft/ FIRST. Confirm the
        # final checkpoint dir name matches (same 4264 rows + hyperparams as the meta twin
        # => checkpoint-254; verify after SFT-1 completes).
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_base_matched_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_base_matched_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_base_matched_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT-1 init staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_base_matched_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "
        # ── stage the meta-removed corpus (B1 output) from iamseungpil/metacot ──
        # BLOCKER: requires B1 to have built + uploaded data/v8_base_rv_sft.parquet to metacot.
        python -c "
        from huggingface_hub import hf_hub_download
        import os, shutil
        p = hf_hub_download(\"iamseungpil/metacot\", \"data/v8_base_rv_sft.parquet\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"])
        os.makedirs(\"/scratch/metacognition/data\", exist_ok=True)
        shutil.copy(p, \"/scratch/metacognition/data/v8_base_rv_sft.parquet\"); print(\"base rv corpus staged\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/v8_base_rv_sft --repo_id iamseungpil/metacot-rv --token $${HF_TOKEN} --interval 90 --config_name v8_base_rv_sft > /scratch/logs/push_base_rv_sft.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        python -m accelerate.commands.launch --config_file configs/accelerate_sft.yaml \
            src/training/sft.py --config configs/sft_base_rv.yaml
        SFT_RC=$$?
        echo "[YAML] base rv-sft rc=$${SFT_RC}"
        # push the final model to iamseungpil/metacot-rv at models/v8_base_rv_sft/
        # with a shard-verify loop (HF 429 can silently drop LFS shards).
        for i in 1 2 3 4 5 6 7 8; do
            python /scratch/metacognition/scripts/push_models_hf.py --model_path /scratch/checkpoints/v8_base_rv_sft --model_name v8_base_rv_sft --repo_id iamseungpil/metacot-rv 2>&1 | tail -8
            N=$$(python -c "from huggingface_hub import HfApi;import os;fs=HfApi().list_repo_files('iamseungpil/metacot-rv',repo_type='dataset',token=os.environ['HF_TOKEN']);print(sum(1 for f in fs if 'v8_base_rv_sft/model-' in f and f.endswith('.safetensors')))")
            echo "[YAML][push] attempt $$i: shards_on_hf=$$N/4"
            [ "$$N" = "4" ] && echo "[YAML][push] all 4 shards durable on metacot-rv models/" && break
            sleep 90
        done
        sleep 86400
        '
