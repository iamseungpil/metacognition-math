description: "TRIOBJ_DCPO_V4 STAGE-2C — conflict-free GDPO composition from the v8_strict SFT (300 steps). Tests whether the composition fixes ALONE stop the s2b difficulty/step collapse (length ratchet -> format/emission collapse -> PMI-coverage death). Deltas vs s2b: anchor-on-R_corr scale normalization (PMI no longer buried), R_emit first-token routing (emission no longer mixed into answer tokens), meta-length cap 96, medium open-meta-then-truncation penalty 0.3, len_cost 0.03->0.08, max_len stays 4096. New eff_scale_* wandb metrics observe whether anchor keeps the meta head at R_corr scale (HC1). Specs: docs/superpowers/specs/2026-06-15-gdpo-conflict-free-reward-composition-design.md. Pushes to iamseungpil/metacot-h200-triobj-dcpo-v3 under checkpoints/triobj_dcpo_v4_stage2c_h100_4x4k/."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: triobj_dcpo_v4_s2c
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 604800
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "447900110"
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        WANDB_API_KEY: ${WANDB_API_KEY}
        WANDB_KEY: ${WANDB_API_KEY}
        WANDB_PROJECT: metacot-dcpo-v4
        WANDB_RUN_GROUP: dcpo_v4_useful_meta
        WANDB_NAME: dcpo_v4_s2c
        WANDB_TAGS: TRIOBJ,DCPO,v4,stage2c,from-sft,pmi,anchor,emit-route,len-cap,composition,TRIOBJ_DCPO_V4
        DCPO_WANDB_ROLLOUTS: "1"
        DCPO_WANDB_ROLLOUTS_EVERY: "1"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        DCPO_DEBUG: "1"
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/models
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        tar -xzf /tmp/metacognition.tar.gz -C /scratch
        echo "$${CODE_TAR_REVISION}" > /scratch/metacognition/.bootstrap_version

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper_early.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh

        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        python /scratch/metacognition/scripts/pull_parquets.py 2>&1 | tail -3

        # ── stage the v8_strict SFT (stage-2 init + frozen PMI ref worker) ───
        python -c "
        from huggingface_hub import snapshot_download
        import os, shutil
        snapshot_download(repo_id=\"iamseungpil/metacot\", repo_type=\"dataset\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"models/v8_meta_inside_strict_sft/checkpoint-254/*\"], local_dir=\"/scratch/models_dl\")
        src=\"/scratch/models_dl/models/v8_meta_inside_strict_sft/checkpoint-254\"; dst=\"/scratch/models/v8_meta_inside_strict_sft\"
        shutil.rmtree(dst, ignore_errors=True); shutil.copytree(src, dst); print(\"base SFT staged\")
        "
        python -c "
        import json; p=\"/scratch/models/v8_meta_inside_strict_sft/tokenizer_config.json\"
        cfg=json.load(open(p)); cfg.pop(\"extra_special_tokens\", None); json.dump(cfg, open(p,\"w\"), indent=2); print(\"tokenizer patched\")
        "

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        nohup python /scratch/metacognition/scripts/push_ckpts_to_hf.py --ckpt_dir /scratch/checkpoints/triobj_dcpo_v4_stage2c_h100_4x4k --repo_id iamseungpil/metacot-h200-triobj-dcpo-v3 --token $${HF_TOKEN} --interval 90 --config_name triobj_dcpo_v4_stage2c_h100_4x4k > /scratch/logs/push_dcpo.log 2>&1 &

        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition
        # RESUME-FROM-HF durability for stage-C itself.
        python /scratch/metacognition/scripts/pull_resume_ckpt.py --repo iamseungpil/metacot-h200-triobj-dcpo-v3 --config_name triobj_dcpo_v4_stage2c_h100_4x4k --local_dir /scratch/checkpoints/triobj_dcpo_v4_stage2c_h100_4x4k --token $${HF_TOKEN} 2>&1 | tail -5
        # TRIOBJ_DCPO_V4 STAGE-C = PMI R_meta + conflict-free composition
        # (anchor/emit-route/len-cap/trunc-penalty), init+ref = v8_strict SFT.
        WANDB_NAME=dcpo_v4_s2c /scratch/conda_envs/simplerl/bin/python -u -m src.training.verl_sdc \
            --config-name=triobj_dcpo_v4_stage2c_h100_4x4k \
            trainer.experiment_name=triobj_dcpo_v4_stage2c_h100_4x4k \
            trainer.default_local_dir=/scratch/checkpoints/triobj_dcpo_v4_stage2c_h100_4x4k \
            actor_rollout_ref.model.path=/scratch/models/v8_meta_inside_strict_sft \
            trainer.resume_mode=auto \
            ++hydra.searchpath=[pkg://verl/trainer/config]
        VERL_RC=$$?
        echo "[YAML] verl_sdc stage2c rc=$${VERL_RC}"
        sleep 86400
        '
