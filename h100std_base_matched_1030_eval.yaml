description: "MATCHED-BASE eval: base_matched_grpo (VANILLA_GRPO, correctness-only on meta_mix) 1030 benchmark at BOTH 4k and 16k vs the meta models (pmishift gs300). Pulls the LATEST base_matched_grpo global_step from metacot-h200-triobj-dcpo-v3, merges FSDP->HF, runs eval_vllm_1030 (gsm8k+math500+aime) at max_tokens 4096 and 16384. Gives the unconfounded base-vs-meta accuracy + whether base-on-meta_mix ALSO degenerates at 16k (=degeneration is data-driven). Uploads to eval/base_matched_1030/. H100 Standard. Tokens via env only."

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: msra-sh-aml-ws

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04

code:
  local_dir: $CONFIG_DIR/

jobs:
  - name: base_matched_1030_eval
    sku: 80G4-H100
    sla_tier: Standard
    priority: high
    identity: managed
    submit_args:
      max_run_duration_seconds: 21600
      env:
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/c4c534bc-9978-4974-9c87-551f7c5754ef/resourceGroups/msra-sh-aml-rg/providers/Microsoft.ManagedIdentity/userAssignedIdentities/msra-sh-aml-uai"
        HF_TOKEN: ${HF_TOKEN}
        HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
        GH_TOKEN: ${GH_TOKEN}
        CODE_TAR_REVISION: "460898594"
        SIMPLERL_DIR: /scratch/conda_envs/simplerl
        VLLM_WORKER_MULTIPROC_METHOD: spawn
        HF_HUB_DISABLE_XET: "1"
        REPO: iamseungpil/metacot-h200-triobj-dcpo-v3
        CONFIG_NAME: base_matched_grpo_h100_4x4k
    command:
      - nvidia-smi
      - |
        bash -c '
        set +e
        set -o pipefail
        set -x
        mkdir -p /scratch/logs /scratch/checkpoints /scratch/eval_results
        cd /scratch
        source /opt/conda/etc/profile.d/conda.sh
        conda activate ptca
        nohup python -c "
        import torch, time
        g = torch.cuda.device_count()
        ts = [torch.randn(2048, 2048, device=f\"cuda:{i}\", dtype=torch.float16) for i in range(g)]
        while True:
            for i in range(g): ts[i] = (ts[i] @ ts[i]) * 0.5
            time.sleep(2)
        " > /scratch/logs/gpu_keeper_inline.log 2>&1 &
        pip install -q "huggingface_hub<1.0" 2>&1 | tail -1

        set +x  # do NOT leak GH_TOKEN into xtrace logs
        curl -fsSL -H "Authorization: token $${GH_TOKEN}" -H "Accept: application/octet-stream" -o /tmp/metacognition.tar.gz https://api.github.com/repos/iamseungpil/metacognition-math/releases/assets/$${CODE_TAR_REVISION}
        set -x
        tar -xzf /tmp/metacognition.tar.gz -C /scratch

        nohup python /scratch/metacognition/scripts/gpu_keeper.py > /scratch/logs/gpu_keeper.log 2>&1 &
        bash /scratch/metacognition/scripts/bootstrap_sdc_node.sh
        export PATH="$${SIMPLERL_DIR}/bin:$${PATH}"
        export CONDA_PREFIX="$${SIMPLERL_DIR}"
        PYBIN=$${SIMPLERL_DIR}/bin/python
        pip uninstall -y hf_xet 2>&1 | tail -1 || true
        export PYTHONPATH=/scratch/metacognition
        cd /scratch/metacognition

        # 1. find the LATEST base_matched_grpo global_step on HF and download it.
        GS=$$($${PYBIN} -c "
        import os, re
        from huggingface_hub import HfApi
        api=HfApi(token=os.environ[\"HF_TOKEN\"])
        fs=api.list_repo_files(os.environ[\"REPO\"], repo_type=\"model\")
        cfg=os.environ[\"CONFIG_NAME\"]
        steps=sorted({int(m.group(1)) for f in fs if (m:=re.search(cfg+r\"/global_step_(\d+)/\",f))})
        print(steps[-1] if steps else 0)
        ")
        echo "[YAML] latest base_matched_grpo global_step = $${GS}"
        if [ "$${GS}" = "0" ]; then echo "[YAML] no checkpoint found, abort"; exit 1; fi
        $${PYBIN} -c "
        from huggingface_hub import snapshot_download
        import os
        snapshot_download(repo_id=os.environ[\"REPO\"], repo_type=\"model\", token=os.environ[\"HF_TOKEN\"],
            allow_patterns=[\"checkpoints/$${CONFIG_NAME}/global_step_$${GS}/**\"], local_dir=\"/scratch\")
        print(\"gs$${GS} downloaded\")
        "
        CKPT=/scratch/checkpoints/$${CONFIG_NAME}/global_step_$${GS}/actor
        MERGED=/scratch/eval_results/merged_base_gs$${GS}
        mkdir -p $${MERGED}
        $${PYBIN} -m verl.model_merger merge --backend fsdp --local_dir $${CKPT} --target_dir $${MERGED}
        if [ "$$?" -ne 0 ]; then echo "[YAML] merge FAILED"; exit 1; fi
        $${PYBIN} -c "
        import json, os
        p=\"$${MERGED}/tokenizer_config.json\"
        if os.path.exists(p):
            c=json.load(open(p)); c.pop(\"extra_special_tokens\", None); json.dump(c, open(p,\"w\"), indent=2); print(\"tok patched\")
        "

        OUT=/scratch/eval_results/base_matched_1030
        mkdir -p $${OUT}
        # 2. eval at BOTH caps (4k = train length / no degen ; 16k = meta comparison).
        for MAXTOK in 4096 16384; do
          NAME=base_gs$${GS}_$${MAXTOK}
          echo "================ EVAL $${NAME} ================"
          $${PYBIN} scripts/eval_vllm_1030.py \
            --model_path $${MERGED} --model_name $${NAME} --output_dir $${OUT}/$${NAME} \
            --benchmarks gsm8k math500 aime2024 --max_problems 500 \
            --max_tokens $${MAXTOK} --temperature 0.7 --top_p 0.95 --tp_size 4 --num_samples 1 \
            2>&1 | tee $${OUT}/$${NAME}.log || echo "[YAML] $${NAME} eval FAILED, continue"
        done

        $${PYBIN} -c "
        from huggingface_hub import HfApi
        import os, glob
        api=HfApi(token=os.environ[\"HF_TOKEN\"])
        for fn in glob.glob(\"$${OUT}/**\", recursive=True):
            if not os.path.isfile(fn): continue
            if not (fn.endswith(\".parquet\") or fn.endswith(\".json\") or fn.endswith(\".log\")): continue
            rel=os.path.relpath(fn, \"$${OUT}\")
            try:
                api.upload_file(path_or_fileobj=fn, path_in_repo=\"eval/base_matched_1030/\"+rel,
                    repo_id=\"iamseungpil/metacot-rv\", repo_type=\"dataset\")
            except Exception as e: print(\"upload skip\", fn, str(e)[:80])
        print(\"base_matched_1030 uploaded\")
        " || echo "[YAML] upload skipped"
        echo "[YAML] base_matched_1030_eval gs$${GS} DONE"
        sleep 600
        '
